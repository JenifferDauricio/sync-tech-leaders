**Painel RPA de controle interno em revisão (FIS-188):** infra de dashboard (FIS-232) pendente de provisionar.\n* **BRD do Motor de Trigger de Escrituração NFS-e concluído (FIS-283):** base para a integração BHules → RPA priorizada para o Cycle 04.\n* **Backlog de rollout estruturado:** issues por município (SP, RJ, Fortaleza, SBC, Campinas) — testes/validação (E1) e rollout gradual (E2), + epics E3, E4, E5.\n* **Epics em andamento:** FIS-284 (Marcelo), FIS-285 (Danilo), FIS-286 e FIS-287 (Guilherme Porto), FIS-288 (Marcelo).\n\n**2. Gestão de Riscos**\nOn track. Frentes avançando dentro do cycle. Repriorizar BHules → RPA para o Cycle 04 reduz risco. Municípios foco Q2 (SP, RJ, Fortaleza, SBC, Campinas) via portais próprios, sem dependência do Nacional. Sem desvios críticos.\n\n**3. KPI**\n* **Primário:** First-time-right na escrituração de NFS-e tomados por município (meta >= 95%).\n* **Status:** milestone \"Construção de RPAs\" com ~80%. SP, Fortaleza e Campinas com RPAs entregues aguardando validação/rollout; SBC via Nacional.\n\n**4. Próximos Passos**\nMarcelo concluir revisão do módulo Nacional (FIS-275) e testes por município (FIS-351) · Danilo finalizar Guia ISS SP (FIS-285) · Guilherme Porto provisionar infra (FIS-232) e concluir painel (FIS-188).\n\n**5. Bloqueios externos**\nMunicípios com certificado/spec de API privada (ex.: Campinas — ABRASF) seguem com workaround via RPA/upload, já em produção. Sem bloqueios que exijam Diretoria/CPO.\n\n*Progresso desde 12/06: Construção de RPAs 75% → 80%*"}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-06-12", "autor": "Andressa", "health": "No prazo", "body": "**Update de Projeto — RPA Fiscal · ponte de automação via bots**\n**Período: Semana · Data: 12/06/2026 · Lead: Jeisy Sousa · Time: Fiscal · Objetivo: O4 · Wave: SN**\n\n**Status geral:** 🟢 No prazo\n\nSemana de alto volume de entregas. A escrituração de NFS-e tomados deu um salto: abordagem via Lambda (scraping HTTP no lugar de VM Windows) validada e implementada para SP e RJ, tornando a escrituração escalável. Cobertura via NFS-e Nacional expandida para SBC, Curitiba, Niterói e demais. RPA ISS SP validado em produção e migrando para Lambda com trigger por eventos. Painel de controle interno avançou para revisão final.\n\n**Marco:** M1 · Construção · RPAs Escrituração e guias entregue — 31/07/2026 · Confiança 🟢 Alta.\n\n**Entregue:** escrituração SP e RJ via Lambda (scraping) ✓ · cobertura NFS-e Nacional (SBC, Curitiba, Niterói + 7 municípios) ✓ · Campinas em produção ✓ · lançamento nota a nota ✓ · RPA ISS SP validado em produção (02/06) ✓ · documentação rollout ISS SP e BRD AWS ✓ · painel em revisão final.\n\nEm andamento: FIS-269 (ISS SP→Lambda), FIS-267 (triagem), FIS-268 (fallback Slack), FIS-275 (módulo Nacional), FIS-271 (deploy AWS), FIS-188 (painel). Aguardando: FIS-260 (BHules→RPA), FIS-282 (Motor Fiscal→RPA ISS SP), FIS-232 (infra painel).\n\n**Bloqueios:** nenhum ativo. **Risco:** município Nacional com XSD privado (mitigação: RPA portal validado como fallback).\n\n*Progresso desde 03/06: Construção de RPAs 0% → 75%*"}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-06-03", "autor": "Andressa", "health": "No prazo", "body": "**Semana 03/06/2026 · 🟢 On track — RPA FISCAL**\n\n**1. Evolução e Progresso**\nSemana marcada pelo go live da automação de emissão de guias ISS São Paulo — principal entrega do Cycle 2. O robô processou o 1º de 3 grupos da base elegível na noite de 02/06, com mais de 100 empresas processadas em produção com insumos reais pela primeira vez. Painel interno avançou com backend integrado ao Bhubot. Bots SPED Agrocontar operacionais na nova estrutura, com monitoramento ativo. Fortaleza em produção para escrituração de NFS tomados.\n\n**2. Gestão de Riscos — Em atenção**\nGo live do ISS SP revelou dois pontos antes do próximo processamento: templates de entrega no Gestta Express ainda não funcionam (guias geradas mas não entregues ao cliente); 3 empresas com ponta invalidada (SOAP com código não tratado). Ambos mapeados e em tratamento.\n\n**3. KPI — Melhorou**\nPrimeiro processamento massivo em produção — +100 empresas no ISS SP, taxa de sucesso elevada (3 casos com observação).\n\n**4. Próximos Passos**\nResolver template do Gestta Express (bloqueador crítico) · investigar 3 casos invalidados · frontend do painel · decisão sobre guias já emitidas · iniciar Campinas.\n\n**5. Bloqueios/Dependências**\nApoio externo necessário? Não. Template Gestta Express em resolução (Jeniffer e JP apoiando)."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-05-29", "autor": "Andressa", "health": "No prazo", "body": "**Semana 29/05/2026 · 🟢 On track — RPA FISCAL**\n\n**1. Evolução e Progresso**\nSemana de alta produtividade. Migração dos bots SPED Agrocontar para o novo framework concluída (todos os 31 bots implantados e operacionais). Escrituração NFS tomados: Fortaleza entregue para testes; Campinas em desenvolvimento. Painel interno de controle dos RPAs (Fiscal + DP) em desenvolvimento ativo, com parte do backend entregue. Validação da emissão do ISS SP em produção com insumos reais em andamento.\n\n**2. Gestão de Riscos — Sem riscos relevantes**\nOn track. A decisão de priorizar arquitetura escalável antes de finalizar Campinas e SBC é estratégica — garante expansão sustentável para 1.100+ clientes SN.\n\n**3. KPI — Sem alteração**\nBaseline de cobertura e redução de intervenção manual a ser estabelecido após estabilização dos bots e entrega do painel.\n\n**4. Próximos Passos**\nEstrutura escalável de escrituração de NFS tomados · concluir migração Agrocontar para VMs + monitoramento · avançar painel (backend+frontend) · ISS SP em produção com insumos reais.\n\n**5. Bloqueios:** Sem bloqueios externos no momento."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-05-22", "autor": "Andressa", "health": "No prazo", "body": "**Semana 22/05/2026 · 🟢 On track — RPA Fiscal**\n\n**1. Evolução e Progresso**\nAlta produtividade em duas frentes. Escrituração de NFS tomados: SP e RJ concluídas no Cycle 1, Campinas em finalização. Bots SPED Agrocontar: migração para o novo framework acelerada — +15 clientes implantados na semana. RPA de emissão de guias ISS SP pronto para validação em produção na 1ª semana de junho.\n\n**Entregas:** escrituração NFS tomados SP ✓ e RJ ✓ em produção · novo padrão de framework em todos os grupos de bots SPED ✓ · +15 clientes Agrocontar migrados ✓ · RPA ISS SP documentado e pronto para rollout em junho.\n\n**2. Gestão de Riscos — Sem riscos relevantes.** Entregas do Cycle 1 dentro do prazo.\n\n**3. KPI — Sem alteração.** Baseline de cobertura no prazo e redução de HITL ainda não estabelecidos.\n\n**4. Próximos Passos**\nConcluir migração dos bots Agrocontar restantes · finalizar top 5 prefeituras (Campinas, Fortaleza) · iniciar Cycle 2 com foco em escalabilidade (1.100+ clientes SN) · MVP do painel interno de monitoramento.\n\n**5. Bloqueios:** Sem bloqueios externos."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-05-14", "autor": "Jeisy Sousa", "health": "No prazo", "body": "**Título do Update:** Semana de 14/05/2026\n**Saúde do Projeto:** 🟢 On track\n\n**Evolução e Progresso**\n* Desenvolvimento e refatoração dos bots SPED clientes Agrocontar em andamento — FIS-54 com 10 de 16 subtarefas concluídas (62,5%).\n* Discovery de Escrituração de NFS Tomados (FIS-2): priorizar top 5 prefeituras (>50% da base); time tech já trabalhando na integração/RPA dessas prefeituras.\n\n**Gestão de Riscos:** On track. Atenção aos guardrails: risco de 2FA em certificado quebrando ~20% dos bots (handoff humano) e mudanças em layouts de prefeituras — exigem monitoramento contínuo.\n\n**KPI:** % de obrigações RPA no prazo / Redução de HITL por bot. Sem baseline (meta >= 95% no prazo; HITL -60%). Projeto iniciou 01/05/2026.\n\n**Próximos Passos**\nConcluir as 6 subtarefas restantes de FIS-54 e avançar para implantação gradual (FIS-68) · acompanhar time tech na escrituração de NFS tomados (FIS-2) e quebra por prefeitura.\n\n**Bloqueios externos:** Nenhum nesta semana. Milestone \"Versão interna pronta\" previsto para 15/jul — atenção ao ritmo."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-06-19", "autor": "Andressa", "health": "Em risco", "body": "**MOTOR TRABALHISTA / DP — Project Update**\n**Título do Update:** Semana de 19/06/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso**\n* **Motor eSocial fluindo para entrega no Cycle 03** — DP-101 (envio da folha ao eSocial) em andamento com Matheus. Infra S-1200/S-1299 em construção.\n* **Validação de relatórios desbloqueada** — DP-100 (Resumo de Folha e Holerites, 10 empresas) em andamento com Reginaldo.\n* **Extrato Mensal em desenvolvimento** — DP-133 criada e em andamento; validação aguarda atualização da base dev.\n* **Plano B do Consignado em construção** — diante do bloqueio DataPrev, Sávio estrutura importação manual; DP-91 em andamento.\n* **Reestruturação de escopo e epics** — DP-135 criado como E7 (orquestração Restate + entrega final); DP-134, DP-137, DP-136 formalizadas.\n* **Cálculo de folha (DP-3) em revisão.**\n* **Alinhamento com Hub sobre Experiência DP concluído** (HUB-235, COCKPIT-523).\n\n**2. Gestão de Riscos**\n* **Risco 1:** base de DEV sem dados de produção (depende de Dan e Felipe) → validação do Extrato Mensal (DP-133) e DP-100 travadas no Cycle 03.\n* **Risco 2:** acesso à DataPrev não obtido → consignado (DP-58 + DP-93) não entregue integralmente via API; Plano B (importação manual) mitiga para produção.\n\n**3. KPI**\n* **Primário:** Empresas SN com folha fechada automaticamente. **Status:** 0/10 empresas (meta: 10 até fim do Cycle 03).\n\n**4. Próximos Passos**\nAtualização da base dev (Dan/Felipe) · conclusão do motor eSocial (DP-101) · Reginaldo avançar Extrato Mensal (DP-133) · Sávio finalizar Plano B do consignado (DP-91 + DP-93) · alinhamentos técnicos com Hub e Cockpit.\n\n**5. Bloqueios externos**\n* **[BLOQUEIO — requer CPO/Diretoria] Base de DEV com dados de produção** (Dan e Felipe) — sem isso DP-133 e DP-100 não fecham no Cycle 03.\n* **[BLOQUEIO EXTERNO] Acesso à DataPrev (Consignado)** — credenciais/acesso à API ainda não obtidos.\n\n*Progresso desde 12/06: Folha s/ apontamento 22% → 18%*"}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-06-12", "autor": "Jeniffer", "health": "Em risco", "body": "**Update de Projeto — Motor Trabalhista · folha + obrigações DP**\n**Período: Semana · Data: 12/06/2026 · Lead: Jeniffer Dauricio · Time: DP + Cockpit + Hub · Objetivo: O4 · Wave: SN**\n\n**Status geral:** 🟡 Em risco\n\nCycle 3 inicia com o motor de cálculo de pró-labore construído e dois desbloqueadores recentes — API do Cockpit liberada e FGTS Digital validado em produção. Mas surgiram dois bloqueios: base de DEV desatualizada/insuficiente para as 10 empresas piloto, e empréstimo consignado impedido até retorno da DataPrev.\n\n**Marco atual:** M1 · Construção · Empresas Pró-Labore SN — 68% conforme Linear · 31/07/2026 · Confiança 🟡 Média.\n\n**Entregue:** FGTS Digital em produção (DP-57) · cálculo de folha e pró-labore Parte 2 com API Cockpit desbloqueada (DP-56) · discovery jornada DP (DP-9) · dependências Cockpit/Hub formalizadas (COCKPIT-523, HUB-235) · decisão: regras de negócio das jornadas ficam no Motor DP.\n\n**Bloqueios:** (1) base de DEV insuficiente — depende de Jorge + Dan, prazo 16/06; (2) habilitação da API DataPrev (consignado, DP-58/DP-93) — aguardando retorno externo.\n\n**Riscos:** acesso à base de Prod não resolvido até 16/06 atrasa validação · DataPrev não retornar no Cycle 3 · integração Hub ↔ Motor DP com múltiplas dependências em triage.\n\n*Progresso desde 02/06: Pró-Labore 0% → 68% · Folha s/ apontamento 0% → 22%*"}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-06-02", "autor": "Andressa", "health": "Em risco", "body": "**Semana 03/06/2026 · 🟡 At risk — MOTOR TRABALHISTA**\n\n**1. Evolução e Progresso**\nSemana de alta entrega em duas frentes. Motor de cálculo: pró-labore e RAT/FAP adicionados ao cálculo de folha; primeiro relatório (holerite) em revisão final; relatório de líquidos concluído. Regras e discovery: documentos técnicos de admissão, rescisão, férias e RPA em revisão. Tabelas do eSocial implantadas no motor com infra e API de consumo. Automação da guia FGTS com arquitetura de robôs refatorada e em deploy.\n\n**2. Gestão de Riscos — Em atenção**\nDois pontos: (1) pendências técnicas de admissão/rescisão/férias/RPA direcionam decisões de arquitetura e dependências DP × Hub; (2) crítico — API do Cockpit para dados reais segue sem funcionar até 02/06, comprometendo entregas do Cycle 2 (desenvolvimento com dados mock → retrabalho).\n\n**3. KPI — Sem alteração.** Baseline no piloto de 10 clientes (julho). API do Cockpit ainda impede validação com dados reais.\n\n**4. Próximos Passos**\nAlinhar pendências técnicas e decisão DP × Hub · resolver API do Cockpit (bloqueador crítico) · finalizar holerite · avançar FGTS em produção · iniciar consignado + Dataprev.\n\n**5. Bloqueios:** Sim. API do Cockpit indisponível — sem ela, motores não validam com dados reais."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-05-29", "autor": "Andressa", "health": "No prazo", "body": "**Semana 29/05/2026 · 🟢 On track — MOTOR TRABALHISTA**\n\n**1. Evolução e Progresso**\nForte avanço em duas frentes. Produto/negócio: documentos técnicos das jornadas de admissão, rescisão, férias e RPA produzidos e em revisão — base para declarar dependências com o Hub. Especificações visuais dos relatórios (holerite, resumo de folha, relatório de líquidos) concluídas. Tecnologia: motor de cálculo de folha com lógica implementada e fluxo estruturado. Validação da emissão de guias FGTS Digital em produção programada para a semana.\n\n**2. Gestão de Riscos — Em atenção**\nDecisão arquitetural em aberto: onde cada regra de negócio das jornadas vai morar (Motor DP ou Hub) — a resolver no Cycle 2. Mapeamento concluído nesta semana; alinhamento entre times na próxima.\n\n**3. KPI — Sem alteração.** Baseline no piloto de 10 clientes (julho).\n\n**4. Próximos Passos**\nValidar FGTS Digital em produção · expandir motor (pró-labore, RAT/FAP) e primeiros relatórios · tabelas eSocial · migração do RPA de admissão para API.\n\n**5. Bloqueios:** Sim — decisão arquitetural DP × Hub (impacta os dois times)."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-05-22", "autor": "Andressa", "health": "No prazo", "body": "**Semana 22/05/2026 · 🟢 On track — Motor Trabalhista**\n\n**1. Evolução e Progresso**\nAvanço em duas frentes. Produto: mapeamento das regras das três jornadas mais críticas — admissão, rescisão e férias — concluído, garantindo validações corretas desde o início. Tech: motor de cálculo de folha próprio em finalização em dev. RPA de emissão de guias FGTS com solução pronta para validação em produção.\n\n**Entregas:** regras de admissão, rescisão e férias documentadas e validadas · specs visuais dos relatórios (holerite, resumo de folha, líquidos) em definição com padrão BHub · motor de cálculo de folha em finalização.\n\n**2. Gestão de Riscos — Sem riscos relevantes.** On track.\n\n**3. KPI — Sem alteração.** Baseline no piloto (julho).\n\n**4. Próximos Passos**\nValidar FGTS em produção · evoluir motor (pró-labore, encargos SN) · relatórios no padrão BHub · iniciar integração com eSocial.\n\n**5. Bloqueios:** Sim — decisão arquitetural em aberto (com Henrique e Jorge): onde residem as regras das jornadas (Motor DP ou Hub)."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-05-15", "autor": "Andressa", "health": "No prazo", "body": "**Semana de 15/05/2026 · 🟢 On track**\n\n**1. Evolução e Progresso**\n* DP-3 iniciada (Cálculo de folha + pró-labore): Eng (Sávio + Reginaldo) iniciou a implementação do cálculo de folha CLT e pró-labore para SN sem apontamentos. Repo bhub-general-ledger em setup.\n* DP-1 iniciada (Geração de relatórios): Eng (Glauco + Mateus) validando endpoints da PoC e levantando campos de Resumo de Folha e Relação de Líquidos.\n* Documentação das issues concluída (contexto + regras de negócio + requisitos).\n* Discovery de jornadas macro iniciado (admissão, rescisão, apontamentos, férias) com foco em dependências com o Hub.\n\n**2. Gestão de Riscos:** On track. Sem desvios.\n\n**3. KPI:** Cobertura Hub DP folha E2E. 0% (motor em implementação). Meta 65% até 15/jul, 100% até 31/jul.\n\n**4. Próximos Passos**\nDP-3: implementar INSS, IRRF, FGTS, RAT×FAP; validar contra 10 folhas reais · DP-1: estrutura do payload e geração de PDF · Infra: ambiente dev com CI/CD (Glauco) · agendar discovery de jornadas com PM do Hub.\n\n**5. Bloqueios externos:** Nenhum que exija Diretoria/CPO. Dependência a observar: jornadas (admissão/rescisão/apontamentos/férias) dependem do Hub — alinhamento com o PM do Hub nas próximas semanas."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-06-19", "autor": "Andressa", "health": "Em risco", "body": "**MOTOR CONTÁBIL — Project Update**\n**Título do Update:** Semana de 19/06/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso**\n* **Backlog de Q2 totalmente quebrado e estruturado no Linear** — epics E1 a E8 do milestone \"Construção | Motor Contábil Entregue\" (CTB-69, CTB-70, CTB-71, CTB-72, CTB-23, CTB-74, CTB-80, CTB-84, CTB-83, CTB-93 a CTB-96, CTB-87). Aguardam validação de Fernando e Jorge sobre sequência/priorização.\n* **Bloqueio de acesso ao Git do Paulo Daniel resolvido** — time liberado para execução técnica.\n* **Discovery da jornada Motor Contábil concluído (CTB-1)** — Readiness Check (CTB-15), mapa de eventos × lançamentos D/C (CTB-10), decisão extrato vs. caixa (CTB-13), dependências externas (CTB-12). E1 em andamento.\n* **Spike do Ledger Midaz concluído (CTB-3).**\n* **Spec dos relatórios contábeis criada (CTB-92)** — Razão, Balancete, Balanço, DRE.\n* **Alinhamento com Hub concluído (HUB-238).**\n\n**2. Gestão de Riscos**\n* **Causa:** motor ainda em discovery/planejamento — nenhuma feature técnica em desenvolvimento efetivo. Validação do backlog com Fernando e Jorge é o próximo gate.\n* **Impacto:** divergência de priorização/escopo pode atrasar o início do dev no próximo cycle, comprimindo o piloto (10 clientes Itaú) em Q2.\n\n**3. KPI**\n* **Primário:** Fechamentos contábeis ponta a ponta automatizados (piloto 10 clientes Itaú). **Status:** 0/10.\n\n**4. Próximos Passos**\nValidação do backlog com Fernando e Jorge · Fernando avançar decisões de arquitetura (CTB-68) e fechar E1 · Elaine iniciar spec dos relatórios (CTB-92) · alinhamentos das dependências do Hub (HUB-238).\n\n**5. Bloqueios externos**\nNão há bloqueios externos que exijam Diretoria nesta semana. (Internos em tratativa: decisões D1–D5 e Ledger Midaz na AWS.)\n\n*Progresso desde 12/06: Construção Motor Contábil 7% → 26%*"}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-06-12", "autor": "Andressa", "health": "Em risco", "body": "**Update de Projeto — Motor Contábil · fechamento + conciliação**\n**Período: Semana · Data: 12/06/2026 · Lead: Andressa Rodrigues · Time: Contábil + Cockpit + Hub · Objetivo: O4 · Wave: SN → LP**\n\n**Status geral:** 🟡 Em risco\n\nDiscovery concluído com jornada TO-BE validada e escopo de construção quebrado em 8 entregas. O desenvolvimento ainda não iniciou — Cycle 3 começou nesta semana — com alto volume de decisões técnicas arquiteturais (D1–D5) que bloqueiam o início de várias entregas.\n\n**Marco:** M1 · Construção · Motor Contábil Entregue — 31/07/2026 · Confiança 🔴 Baixa.\nIssues concluídas: 4 (TO-BE validado, Plano de contas mínimo SN, Sustentação Hidra, Mapa de eventos D/C). Em andamento: 3 (Estudo Midaz/Matcher, Discovery CTB-1, Readiness Check). Pendentes/bloqueadas: ~30 (aguardando D1–D5 e Ledger no ar).\n\n**Bloqueios:** (1) decisões D1–D5 (Jorge + Fernando + comitê, prazo 20/06) — bloqueia E2–E8; (2) setup do Ledger Midaz na AWS (Paulo Dias, CTB-4) — atraso por falta de acessos/onboarding.\n\n**Riscos:** D1–D5 atrasar além de 20/06 · milestone 31/07 inatingível com 8 entregas sem início (mitigação: reduzir piloto a MVP Itaú) · alta dependência do Jorge.\n\n**Decisões necessárias:** D1 fusão vs. separação dos motores de classificação · D2 onde mora o plano de contas · D3 onde mora o histórico · D4 papel da IA · D5 multi-tenant Midaz (prazo 20/06).\n\n*Progresso desde 02/06: Construção Motor Contábil 0% → 7%*"}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-06-02", "autor": "Andressa", "health": "Em risco", "body": "**Semana 03/06/2026 · 🟡 At risk — MOTOR CONTÁBIL**\n\n**1. Evolução e Progresso**\nSemana de avanço expressivo no discovery. Mapeamento AS-IS do processo contábil concluído e grande avanço no TO-BE. Plano de contas mínimo SN validado e entregue. Mapa de eventos e lançamentos D/C (interface entre Motor Contábil, DP e Fiscal) concluído. Estudo técnico do Ledger Midaz e Matcher (Lerian) em andamento. Readiness Check iniciado. Novas frentes refinadas para o próximo cycle (De/Para de plano de contas, onboarding contábil).\n\n**2. Gestão de Riscos — Em risco**\nO estudo técnico revelou volume significativo de dúvidas do time de engenharia sobre as ferramentas e o projeto — impedindo o início de qualquer desenvolvimento. Em 02/06 alinhado com Jorge para nivelar o time com documento de esquemas e fluxos. Escopo grande, dev só inicia no Cycle 3, alta dependência do Jorge nas primeiras semanas.\n\n**3. KPI — Sem alteração.** Discovery; baseline a partir da versão interna SN em julho.\n\n**4. Próximos Passos**\nJorge entregar documento de nivelamento (Ledger Midaz/Matcher) · concluir decisão fluxo com/sem extrato, Readiness Check e TO-BE · formalizar dependências com DP, Fiscal e Open Banking.\n\n**5. Bloqueios:** Não — necessidade de apoio já alinhada; soluções encaminhadas."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-05-29", "autor": "Andressa", "health": "No prazo", "body": "**Semana 29/05/2026 · 🟢 On track — MOTOR CONTÁBIL**\n\n**1. Evolução e Progresso**\nDiscovery avançou de forma consistente. Plano de contas mínimo SN concluído e validado com a especialista contábil. Desenho do TO-BE da jornada contábil SN iniciado, assim como o AS-IS do processo atual. Mapa de eventos e lançamentos D/C (interface entre Motor Contábil, DP e Fiscal) iniciado. Decisão sobre fluxo com extrato vs. fechamento via caixa em andamento. Engenharia iniciou o estudo técnico do Ledger Midaz e Matcher; primeiras tasks do Cycle 3 começaram a ser quebradas.\n\n**2. Gestão de Riscos — Sem riscos.** Em andamento conforme planejamento.\n\n**3. KPI — Sem alteração.** Discovery; baseline a partir da versão interna SN em julho.\n\n**4. Próximos Passos**\nConcluir AS-IS, TO-BE, mapa de eventos D/C e decisão com/sem extrato · finalizar estudo técnico Ledger Midaz/Matcher · refinar tasks do Cycle 3 · discovery do reprocessamento retroativo.\n\n**5. Bloqueios:** Não. Dependências com DP e Fiscal (mapa de eventos D/C) mapeadas internamente."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-05-22", "autor": "Andressa", "health": "No prazo", "body": "**Semana 22/05/2026 · 🟢 On track — Motor Contábil (Discovery Q2 · LP Q3)**\n\n**1. Evolução e Progresso**\nDiscovery iniciado com foco no SN. Jornada completa sendo estruturada — AS-IS (Domínio, Conciliador, Hydra) e TO-BE (Ledger Midaz + Matcher da Lerian). Frentes do Cycle 2 refinadas e distribuídas: AS-IS, TO-BE, mapa de eventos contábeis, plano de contas mínimo e dependências externas.\n\n**Entregas:** escopo do discovery estruturado e refinado para o Cycle 2, com responsáveis definidos. Nenhuma entrega finalizada ainda.\n\n**2. Gestão de Riscos — Sem riscos relevantes.** Discovery conforme planejado.\n\n**3. KPI — Sem alteração.** Discovery; baseline a partir da versão interna SN, ramp em Q3.\n\n**4. Próximos Passos**\nProduto: AS-IS, TO-BE com validação da especialista, plano de contas mínimo, dependências externas. Tecnologia: estudo técnico do Ledger Midaz e Matcher.\n\n**5. Bloqueios:** Sem bloqueios externos."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-05-15", "autor": "Andressa", "health": "No prazo", "body": "**Título do Update:** Semana de 15/05/2026\n**Saúde do Projeto:** 🟢 On track\n\n**1. Evolução e Progresso**\nSem evolução técnica ou de negócio nesta semana. O projeto foi deliberadamente desprioritizado no Cycle 1 em favor de outras iniciativas do quarter. Nenhum marco ou entrega atingido.\n\n**2. Gestão de Riscos**\nOn track conforme planejamento. A ausência de progresso é esperada — o Motor Contábil entra em execução no Cycle 2.\n\n**3. KPI**\nConciliador piloto + 5 estágios. Status: -. Baseline ainda não estabelecido.\n\n**4. Próximos Passos**\nAgendar reuniões de contexto das ferramentas (Conciliador, Ledger, Matcher) com Jorge e Jeni · agendar discovery das primeiras jornadas contábeis (5 estágios priorizados para Q2). Nenhuma entrega técnica prevista.\n\n**5. Bloqueios externos**\nNão há bloqueios. Disponibilidade de Jorge e Jeni para as reuniões de contexto é pré-condição para o início do Discovery."}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-06-19", "autor": "Gabriel Bicalho Carvalho", "health": "Em risco", "body": "# Semana de 19/06 · 🟡 At risk\n\n**1. Evolução e Progresso**\nViramos a chave no maior risco técnico que mantinha o projeto em vermelho: a importação das admissões no sistema de folha (Domínio). Construímos o novo caminho de importação e a operação validou o envio ponta a ponta com sucesso. Rodamos testes com serviços compartilhados e a operação Carnevale (HUB e Cockpit) e iniciamos conversas com os primeiros clientes. Com a V1 fechada (sem pendências), a solução entra em produção nesta próxima semana. Fechamos a arquitetura que liga a experiência ao Autopilot: validações passam a viver numa aplicação de regras de DP (fonte única), com o SN seguindo caminho automático até o motor.\nEntregas: importação na Domínio destravada e validada · testes HUB+Cockpit com Carnevale · V1 fechada · catálogo de 21 motivos de rescisão + tabelas eSocial · experiência do operador · arquitetura do Autopilot definida.\n\n**2. Gestão de Riscos — Em risco**\nO risco se desloca para a aplicação de regras de DP (fonte das validações) — hoje só expõe a tabela do eSocial e concentra ~365 regras a modelar, sem capacidade de eng garantida até fim de julho. Soma-se a confiabilidade do dado da Domínio (defasagem ~10 dias, crítica para rescisão/férias). É isso que ameaça o gate do Autopilot — não mais a V1.\n\n**3. KPI — Sem alteração.** Métricas de adoção/qualidade só a partir do piloto em produção. Target pós-piloto: >=40% de adoção em D+30 (Carnevale/BLN).\n\n**4. Próximos Passos**\nAbrir piloto em produção (Carnevale/BLN) · estruturar a aplicação de regras de DP · recorte das ~365 regras prioritárias · re-teste da importação para férias/rescisão.\n\n**5. Bloqueios — Sim.** Caminho crítico até o gate do Autopilot é a aplicação de regras de DP; time sem capacidade no prazo (contratações só em julho). Apoio: alocar eng (Digital + motor) e fechar recorte das regras. Confiabilidade do dado Domínio em acompanhamento.\n\n*Progresso desde 11/06: DP1.M1 (V1 + piloto) 77% → 85%*"}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-06-13", "autor": "Gabriel Bicalho Carvalho", "health": "Off track", "body": "# Semana de 11/06 (revisado 13/06) · 🔴 Off track · Lead: Gabriel Bicalho Carvalho · Cockpit/Hub\n\nAvançamos no maior risco técnico (importação das admissões na Domínio), mas ele ainda não está fechado: documentação oficial desatualizada e descoberto um novo layout de TXT, em validação ponta a ponta. A experiência evoluiu com pré-preenchimento automático dos dados do colaborador. A V1 fecha na semana de 15/06, abrindo testes com os primeiros clientes na sequência.\n\nMarcos: DP1.M1 (V1 + piloto) 🔄 83% — 15/06 · DP1.M2 (formulário inteligente + base não-Onvio 3.776) — 30/06 · DP1.M3 (formulário completo + Cockpit, bases do Autopilot SN) — 31/07.\nIssues: ~91 de 110 concluídas · ~12 em andamento · 0 bloqueadas.\n\nDependências: dados de colaboradores da Domínio (✅) · integração Gestta (aguardando, 31/07) · automação da importação na folha (aguardando, 31/07).\nRiscos: formulários com validação automática de regras trabalhistas (escopo grande) · importação na Domínio (novo layout em validação)."}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-06-11", "autor": "Marina Alves", "health": "Off track", "body": "# Semana de 11/06 · 🔴 Off track · Lead: Gabriel Bicalho Carvalho · Cockpit/Hub\n\nFechamos o maior risco técnico: o sistema de folha não aceitava o formato de importação para admissões — construímos o caminho alternativo, quase finalizado (10 de 11 etapas). A experiência evoluiu com pré-preenchimento automático. A V1 fecha sexta (12/06); testes com os primeiros clientes na semana seguinte.\n\nMarcos: DP1.M1 (V1 + piloto) 🔄 77% — 15/06 · DP1.M2 (base não-Onvio 3.776) — 30/06 · DP1.M3 (substituição completa do Onvio, 4.285) — 31/07.\nIssues: ~85 de 110 concluídas.\n\n**Bloqueio:** 5 telas do Cockpit sem responsável definido — depende da liderança Cockpit (prazo 12/06); essenciais para o operador processar solicitações.\nDependências: dados Domínio (✅) · procuração digital Certisign (30/06) · Gestta (31/07) · automação da importação (31/07)."}, {"proj": "triagem-ocr", "projNome": "Triagem de Documentos (OCR)", "data": "2026-06-19", "autor": "Ana Caroline", "health": "No prazo", "body": "## Triagem Automática de Documentos — Semana 25 · 19/06 · 🟢 No prazo · Lead: Ana Caroline · Cockpit\n\nTrês entregas de infraestrutura de segurança (antivírus no pipeline de triagem) concluídas. Exibição de categoria e racional do OCR ao operador entregue, elevando rastreabilidade da triagem manual.\n\nMarcos: M1 (universo + regras de roteamento) ✅ · M2 (top 5 tipos roteados + embarque no Hub) ✅ 17/06 · M3 (60% dos tipos com roteamento automático) 🔄 30/06 · M4 (regras documentadas/auditáveis) Jul · M5 (100% dos tipos) Ago.\nMarco atual M3 — confiança 🟢 Alta. Issues: 75 de 80 (ciclo 3) · 5 em andamento · 0 bloqueadas.\nFalta: validar NFS-e SP em lote (COCKPIT-305) · padronizar fixtures XMLFiscalParser (COCKPIT-306) · monitorar taxa de exceção.\n\nBloqueios: nenhum. Dependências externas: nenhuma.\nEntregue: COCKPIT-599 (gate antivírus no workflow Restate) · COCKPIT-598 (GuardDuty Malware Protection S3) · COCKPIT-603 (volume .rar/.7z) · COCKPIT-522 (categoria/racional OCR ao operador)."}, {"proj": "triagem-ocr", "projNome": "Triagem de Documentos (OCR)", "data": "2026-06-12", "autor": "Ana Caroline", "health": "No prazo", "body": "## Triagem Automática de Documentos — Semana 24 · 12/06 · 🟢 No prazo · Lead: Ana Caroline · Cockpit + Data\n\n63% concluído — maior avanço entre todos os projetos. Funcionalidade de classificação OCR com racional entregue nesta semana.\n\nMarcos: M1 ✅ 06/06 · M2 (top 5 tipos + embarque no Hub) 🔄 20/06 · M3 (60%) 11/07 · M4 (regras auditáveis) 01/08 · M5 (100%) 31/07.\nMarco M2 — confiança 🟢 Alta. Issues: 75 de 120 (63%) · 31 em andamento · 1 bloqueada (COCKPIT-279 spike vírus).\n\n**Bloqueio:** permissões Terraform bloqueando anonimização de salário no cluster (risco LGPD) — depende de Felipe (infra); contorno via acesso temporário (Dan). Prazo 13/06.\nRiscos: documento gerado por IA detectado no pipeline (fraude) · escopo 50% acima do planejado (126 vs 84 pts).\nEntregue: COCKPIT-522 (categoria/racional OCR) · resolução de tela branca (COCKPIT-297 a 304) · BUG-15 (10/11) · BUG-06 (5/5) · SSO Microsoft (Agrocontar) · Lead DB Domínio semanal."}, {"proj": "triagem-ocr", "projNome": "Triagem de Documentos (OCR)", "data": "2026-06-03", "autor": "Ana Caroline", "health": "No prazo", "body": "## Triagem Automática de Documentos — Semana de 03/06 · 🟢 On track\n\nSem avanços relevantes registrados nesta semana; nenhuma entrega concluída no período.\nRiscos: sem riscos relevantes — on track, com Spec prevista para 15/06.\nKPI: revisado sem movimentação.\nPróximos passos: avançar na Spec (OCR + roteamento) para entrega até 15/06.\nBloqueios: sem dependências externas."}, {"proj": "copiloto-samurai", "projNome": "Copiloto Samurai", "data": "2026-06-12", "autor": "Ana Caroline", "health": "Em risco", "body": "## Copiloto Samurai · IA dentro do Cockpit — Semana 24 · 12/06 · 🟡 Em risco · Lead: Ana Caroline · Cockpit\n\nAt risk. 0% de execução técnica. M1 entregue (casos de uso e governança definidos), mas M2 sem início. Daniel alocado integralmente em DP e GTO. Prazo 31/07 em risco com ~6 semanas restantes.\n\nMarcos: M1 (casos de uso + governança HITL) ✅ · M2 (50% dos operadores usando diariamente) ⏳ a definir · M3 (80% + KPI de onboarding) ⏳ 31/07.\nMarco M2 — confiança 🔴 Baixa. Issues em andamento: 0.\n\n**Bloqueio:** Daniel alocado integralmente em Projeto DP e GTO — sem capacidade para o Samurai. Depende da liberação de agenda após o Projeto DP; retomada prevista pós 20/06; avaliar redução de escopo da V1.\nEntregue: M1 (casos de uso + governança HITL) · plano de rollout por squads."}, {"proj": "copiloto-samurai", "projNome": "Copiloto Samurai", "data": "2026-06-03", "autor": "Ana Caroline", "health": "Em risco", "body": "## Copiloto Samurai — Semana de 03/06 · 🟡 At risk\n\nSem avanços relevantes; nenhuma entrega concluída.\nRiscos — Em atenção: o projeto permanece em risco por dependência direta do Projeto Contexto (pausado). A qualidade do contexto do cliente é insumo crítico para o Samurai operar com precisão.\nKPI: meta de adoção interna (>=50% dos operadores até Ago) sem movimentação. Spec prevista para 15/06.\nPróximos passos: avançar na Spec do modelo composto (consulta vs. ação) e feedback loop.\nBloqueios — Sim: avanço da frente de contexto do cliente é pré-requisito; a pausa no Projeto Contexto é risco ativo."}, {"proj": "copiloto-samurai", "projNome": "Copiloto Samurai", "data": "2026-05-29", "autor": "Ana Caroline", "health": "Em risco", "body": "## Copiloto Samurai — Semana de 29/05 · 🟡 At risk\n\nSpec técnica em construção (target 15/06). Dependência estratégica mapeada: requer como pré-requisito a qualidade dos dados do Projeto Contexto. Nenhuma entrega técnica concluída — projeto em fase de teste da operação.\nRiscos — Em risco: depende da cobertura e qualidade dos campos do cockpit (Projeto Contexto), sem priorização definida.\nKPI: ainda não definido formalmente.\nPróximos passos: finalizar a Spec · alinhar formalmente a dependência com o Projeto Contexto · expandir testes em operação.\nBloqueios — Sim: Projeto Contexto aguarda decisão de priorização da liderança de OPS."}, {"proj": "bpo-financeiro", "projNome": "BPO Financeiro", "data": "2026-06-12", "autor": "Ana Caroline", "health": "Em risco", "body": "## BPO Financeiro · Pagamentos e Recebimentos — Semana 24 · 12/06 · 🟡 Em risco · Lead: Ana Caroline · Cockpit\n\nAt risk. 0% de execução técnica. Semana de início do discovery. Processo de faturamento altamente fragmentado identificado como principal risco: múltiplos canais, faturamento fora do sistema e ausência de fonte da verdade.\n\nMarcos: M1 (Discovery + Design validado) 🔄 04/07 · M2 (Go/No-go) ⏳ 31/07.\nMarco M1 — confiança 🟡 Média. Issues: 0 de 7 · 1 em andamento (mapeamento de JTBDs). Lucas Gerez mapeando a planilha de 78 abas do financeiro.\n\n**Bloqueio:** processo de faturamento fragmentado — sem fonte da verdade no sistema. Depende de Daniel (abordagem de conciliação); papo Daniel + Lucas agendado. Prazo 16/06.\nRiscos: faturamento fragmentado inviabiliza automação sem redesenho de processo · prazo 31/07 apertado com discovery no início."}, {"proj": "bpo-financeiro", "projNome": "BPO Financeiro", "data": "2026-06-03", "autor": "Ana Caroline", "health": "Em risco", "body": "## BPO Financeiro — Semana de 03/06 · 🟡 At risk\n\nSem avanços relevantes; nenhuma entrega concluída.\nRiscos — Em atenção: projeto iniciado em 01/06 em fase de Discovery. Risco na definição do escopo do produto — sem clareza do JTBD do BPO Financeiro, o planejamento do Q3 fica comprometido. Spec prevista para 31/07.\nKPI: TMR BPO Financeiro sem baseline.\nPróximos passos: iniciar Discovery — mapear JTBD e priorizar features para Q3.\nBloqueios — Sim: depende de alinhamento com o time financeiro e validação de escopo com o parceiro Omie."}, {"proj": "bpo-financeiro", "projNome": "BPO Financeiro", "data": "2026-06-01", "autor": "Ana Caroline", "health": "Em risco", "body": "## BPO Financeiro — Semana de 29/05 · 🟡 At risk\n\nArquitetura técnica da plataforma definida e documentada — substituição do legado Consulmon por solução escalável (fila inteligente, processamento parcial de pagamentos, integração com ERP). Escopo do 1º módulo (Contas a Pagar) delimitado.\nEntregas: documentação de arquitetura, backlog e decisões técnicas consolidada; escopo de Wave 1 e Wave 2 mapeado.\nRiscos — Em atenção: ainda em documentação; 6 decisões de produto/ops em aberto antes do desenvolvimento, sob risco de retrabalho.\nKPI: dobrar o volume operacional (~800 tickets/mês) sem aumento de headcount — ainda não rastreável.\nBloqueios — Sim: 6 decisões dependem de produto e operações."}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-06-05", "autor": "Gabriel Bicalho Carvalho", "health": "Em risco", "body": "# Semana de 05/06 · 🟡 At risk\n\nSemana de forte destravamento nos testes ponta a ponta. Validamos o ciclo completo cliente→operador (abre no Hub, processa/conclui no Cockpit, volta como \"Concluída\"). Admissão CLT percorrida ponta a ponta na visão do operador pela 1ª vez. Caíram vários bloqueios: cliente voltou a ver suas solicitações, envio de apontamentos em folha desbloqueado, cadastro de colaborador estrangeiro ajustado. Cargos e departamentos já vêm do sistema de origem.\n\n**Riscos — Em atenção:** a Domínio não importa admissões CLT/estagiário pelo formato usado — o caminho suportado é via eSocial; precisa decidir a alternativa antes do piloto. Operador ainda não vê anexos do cliente; edições sem trilha de auditoria.\n**Próximos:** decidir caminho de importação · corrigir anexos e trilha de auditoria · concluir listas regulatórias · remarcar go/no-go do piloto."}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-05-29", "autor": "Gabriel Bicalho Carvalho", "health": "Em risco", "body": "# Semana de 29/05 · 🟡 At risk\n\nEntramos nos testes ponta a ponta da Admissão CLT (a mais complexa das 10 solicitações) com dados reais. 1º formulário testado e2e gerou lista de correções (parte resolvida na semana). Integração de dados de colaboradores destravada e endpoints em fechamento. Definida a estrutura de anexos; aberto o desenho da fila/gestão de tarefas do operador.\n\n**Riscos — Em atenção:** abertura do piloto (5 primeiros clientes), prevista p/ 22/05, escorregou. Modelo de fila inteligente impede o operador de escolher tarefas e trava o teste completo — precisa de saída p/ operação inicial. Carga inicial pode ser manual.\n**Próximos:** concluir correções do form CLT · fechar endpoints da integração · saída de fila p/ operação inicial · nova data de go/no-go."}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-05-21", "autor": "Gabriel Bicalho Carvalho", "health": "No prazo", "body": "# Semana de 21/05 · 🟢 On track\n\nFase de testes ponta a ponta dos 10 formulários (endpoints e campos) antes do go-live. Critérios de aceite prontos; backend acelerou com reforço do Edmar (GTO) — destravou o formulário de Estagiário e habilitou ambiente de testes com volume real. Admissão CLT no Cockpit perto do fechamento. Operação Carnevale engajada (18/05); Francesco apoia as conversas 1:1 com os 5 primeiros clientes.\n\n**Riscos — Em atenção:** 2 integrações Hub↔Cockpit em validação (API de campos do Domínio + retorno de anexos); caminho de cancelamento pelo operador; importação via TXT Domínio.\n**Próximos:** 25/05 go/no-go com os 5 primeiros clientes Carnevale."}, {"proj": "solicitacoes-dp", "projNome": "Solicitações DP", "data": "2026-05-15", "autor": "Gabriel Bicalho Carvalho", "health": "No prazo", "body": "# Semana de 11–15/05 · 🟢 On track\n\nEvolução no Hub (cliente) e no Cockpit (operador): 4 PRs no experiencia-dp (anexos, dependentes, IRRF×pensão, harmonização com o DS) e 8 PRs no experiencia-dp-operador (sync com protótipo, lista do operador, admin de gestão de tarefas). Campos de colaboradores destravados, abrindo a importação inicial dos dados. Estrutura da integração Gestta desenhada.\n\n**Riscos — Em atenção:** milestone da V1 recalibrado de 15/05 → 22/05 para fechar os testes e2e dos 10 formulários com mais consistência.\n**Próximos:** critérios de aceite dos 10 forms · importação inicial no dev · validar TXTs no Domínio · devolução de OS na Gestta · go/no-go com 5 clientes em 22/05."}, {"proj": "triagem-ocr", "projNome": "Triagem de Documentos (OCR)", "data": "2026-05-29", "autor": "Ana Caroline", "health": "No prazo", "body": "**Semana de 29/05 · 🟢 On track**\n\nProjeto com maior volume de entregas do ciclo. Triagem automática avançou com melhorias na precisão da extração e na inteligência de roteamento, reduzindo intervenção manual. Lógica de identificação/registro do motivo de triagem manual implementada (visibilidade do porquê do desvio). Extração e padronização de campos de endereço e fiscais consolidadas.\n\n**Riscos — Em atenção:** escopo cresceu 30% acima do planejado; alto volume em revisão simultânea pode gerar gargalo no fim do ciclo.\n**KPI:** 58% do ciclo concluído, dentro do prazo.\n**Próximos:** concluir itens em revisão · integração cockpit ↔ motor de tarefas operacionais."}, {"proj": "triagem-ocr", "projNome": "Triagem de Documentos (OCR)", "data": "2026-05-22", "autor": "Ana Caroline", "health": "No prazo", "body": "**Semana de 22/05 · 🟢 On track**\n\nConcluído o milestone Documentação Canônica das Regras de Triagem (100%, 9 issues), 10 dias antes do prazo — fonte única e sempre atualizada das regras que determinam por que um documento cai em triagem manual. Auditoria completa do código de triagem; 9 documentos desatualizados substituídos por estrutura canônica (camada de negócio + drill-down técnico). 12 motivos de roteamento manual documentados. Stack de 6 PRs em revisão; 7 gaps de cobertura de testes (BDD) registrados.\n\n**Riscos:** sem riscos relevantes.\n**KPI:** KR4.3 — classificação estável em 95,2% (meta >=95%, atingida); roteamento sem baseline (meta >=80%).\n**Próximos:** planejar milestone Spec · signoff humano da documentação com a operação (prazo 15/06)."}, {"proj": "triagem-ocr", "projNome": "Triagem de Documentos (OCR)", "data": "2026-05-15", "autor": "Ana Caroline", "health": "No prazo", "body": "**Semana de 15/05**\n\nReunião de Backlog Linear (13/05). DIA-2357 (duplicação no repositório Gestta) em progresso com Bosco; mapear com o Bio a experiência de inserção dos operadores e entradas paralelas.\n**Riscos:** métrica de arquivos duplicados sem dashboard (DIA-2364) · alocação de triagem ainda hardcoded (DIA-2344) · tratamento de arquivos com senha indefinido.\n**KPI:** KR4.3 — classificação 95,2% + roteamento sem baseline → meta classificação >=95% + roteamento >=80%.\n**Próximos:** fechar DIA-2357 · priorizar DIA-2364 · mapear entradas paralelas · arquivos com senha · consolidar backlog."}, {"proj": "copiloto-samurai", "projNome": "Copiloto Samurai", "data": "2026-05-15", "autor": "Ana Caroline", "health": "Em risco", "body": "**Semana de 15/05 · 🟡 At risk**\n\nSem reuniões ou entregas nesta semana. Projeto permanece em fase de descoberta; onboarding com Dan ainda não realizado.\n**Riscos:** nenhuma iniciativa feita quanto ao projeto ainda.\n**KPI:** adoção interna >=80% dos operadores até jul/2026 · proxy: redução do tempo de onboarding de operador novo.\n**Próximos:** agendar onboarding com Dan para entender o estado atual e o que já foi mapeado na descoberta."}, {"proj": "bpo-financeiro", "projNome": "BPO Financeiro", "data": "2026-05-15", "autor": "Ana Caroline", "health": "No prazo", "body": "**Semana de 15/05 · 🟢 On track**\n\nNa reunião de Backlog Linear (13/05), apontado que o BPO Financeiro não está recebendo a devida atenção. Necessário reunir com Lozano para entender o contexto do produto e os próximos passos. Henrique mencionou um documento existente, possivelmente desatualizado.\n**Riscos:** o projeto precisa de mais atenção e prioridade para ter andamento real.\n**KPI:** alimenta KR5.5 (TMR célula de entrada BPO Financeiro) · cross-sell potencial (base Contábil sem BPO).\n**Próximos:** receber documento do Henrique · reunir com Lozano · envolver Dan e Odmar."}, {"proj": "gdocs-multicnpj", "projNome": "GDocs multi-CNPJ", "data": "2026-06-19", "autor": "Gabriel Bicalho Carvalho", "health": "No prazo", "body": "# Semana de 19/06 · 🟢 On track\n\nA nova experiência de compartilhamento multi-CNPJ entrou em produção para toda a operação — destaque no all hands. O operador monta um pacote único com os documentos de todos os CNPJs do grupo e faz um envio consolidado por destinatário, no lugar de repetir empresa por empresa. Saímos dos testes controlados para a liberação ampla, à frente do marco (30/06) e sem regressão.\n\n**Entregas:** liberação ampla multi-CNPJ em produção · marco \"Pacote multi-CNPJ no ar\" 100% · coexistência com o envio anterior validada (sem regressão).\n**Riscos — Em atenção:** acompanhar o comportamento real dos envios nos primeiros dias de uso pleno (risco baixo).\n**Próximos:** 1ª leitura da taxa de substituição (envio anterior → multi-CNPJ) · confirmar estabilidade.\n\n*Progresso desde 11/06: GD1.M1 95% → 100%*"}, {"proj": "gdocs-multicnpj", "projNome": "GDocs multi-CNPJ", "data": "2026-06-11", "autor": "Gabriel Bicalho Carvalho", "health": "No prazo", "body": "# Semana de 11/06 · 🟢 On track\n\nFechamos a construção da V2 (pacote multi-CNPJ — wizard de 5 passos, email único consolidado por destinatário, elegibilidade automática por CNPJ) e iniciamos os testes em produção (feature flag). Resolvido o ajuste na regra de autorização do disparo dos pacotes. O acompanhamento de envio virou Aposta própria (clareza de escopo).\n\n**Riscos — Em atenção:** testes controlados antes da liberação ampla; risco baixo, sem pendências de construção.\n**Próximos:** concluir testes controlados · liberar ampla (feature flag) · 1ª leitura da taxa de substituição.\n\n*Progresso desde 04/06: GD1.M1 0% → 95%*"}, {"proj": "gdocs-acompanhamento", "projNome": "GDocs acompanhamento", "data": "2026-06-19", "autor": "Gabriel Bicalho Carvalho", "health": "No prazo", "body": "# Semana de 19/06 · 🟢 On track\n\nO painel de acompanhamento de envio entrou em produção — destaque no all hands. O operador enxerga no Cockpit a linha do tempo de cada envio por destinatário: e-mail entregue, aberto e clique no link de download, sem depender de outras áreas. Entrega à frente do previsto (target 22/06).\n\n**Entregas:** painel disponível (lista de envios + detalhe por destinatário) · marco GD2.M1 100% · registro completo do ciclo de vida por destinatário.\n**Riscos:** sem riscos relevantes — fase de adoção pelo operador.\n**Próximos:** acompanhar adoção · validar ciclo completo em uso real.\n\n*Progresso desde 11/06: GD2.M1 55% → 100%*"}, {"proj": "gdocs-acompanhamento", "projNome": "GDocs acompanhamento", "data": "2026-06-11", "autor": "Gabriel Bicalho Carvalho", "health": "No prazo", "body": "# Semana de 11/06 · 🟢 On track\n\nConstruímos toda a base: o sistema passou a registrar cada evento de entrega por destinatário (entregue/aberto/clique) — antes guardava só o último status — e as consultas que alimentam o acompanhamento (lista de envios + linha do tempo por destinatário) ficaram prontas. Desenho do painel em revisão.\n\n**Riscos — Em atenção:** falta construir o painel no Cockpit (frontend); base de dados e consultas fechadas.\n**Próximos:** construir lista de envios + detalhe por destinatário (frontend) · finalizar desenho · validar ponta a ponta."}, {"proj": "copiloto-samurai", "projNome": "Copiloto Samurai", "data": "2026-06-19", "autor": "Ana Caroline", "health": "Em risco", "body": "## Copiloto Samurai (BSamurai) — Semana 25 · 19/06 · 🔴 Bloqueado · Lead: Ana Caroline · Cockpit\n\nProjeto parado. A execução depende exclusivamente de Daniel, alocado em prioridades críticas do trimestre (Projeto DP, Cockpit 100%). Sem previsão de retomada no curto prazo. O produto está tecnicamente desenvolvido — falta apenas população de dados e testes com usuários.\n\n**Marcos:** M1 (casos de uso + governança) em andamento · M2 (50% operadores) e M3 (80% + KPI) a definir.\n**Bloqueio:** indisponibilidade do único responsável técnico (Daniel) — bloqueia o M1 indefinidamente; aguardando agenda após o M4 do Projeto DP (desde 02/06).\n**Próximos 7 dias:** nenhuma entrega prevista."}, {"proj": "bpo-financeiro", "projNome": "BPO Financeiro", "data": "2026-06-19", "autor": "Ana Caroline", "health": "Em risco", "body": "## BPO Financeiro — Semana 25 · 19/06 · 🔴 Bloqueado · Lead: Ana Caroline · Data/Cockpit\n\nDemanda originada pelo CFO para um painel financeiro com indicadores de faturamento. Principal bloqueio: ausência de processos padronizados de faturamento — múltiplos meios de pagamento não rastreados no sistema. Discovery em andamento para entender o escopo real antes de construir.\n\n**Marcos:** M1 Discovery + Design (30/06) · M2 Go/No-go (jul). Issues: 1 de 4 concluídas, 1 bloqueada.\n**Entregue:** SSO Microsoft p/ Agrocontar · início da análise do Excel financeiro (78 abas).\n**Bloqueio:** processo de faturamento não padronizado impede definir o escopo — depende de Daniel/Financeiro; reunião Lucas+Daniel 20/06 (prazo de desbloqueio 23/06).\n**Próximos:** mapear regras/exceções de faturamento (27/06); fechar M1 em 30/06."}];
const CONSOLIDADO = {"semana": "2026-06-19", "nota": "Avanços, bloqueios e pendências da semana por projeto (do Project Update mais recente). Copiloto Samurai e BPO Financeiro: último report em 12/06.", "itens": [{"proj": "motor-fiscal-sn", "data": "2026-06-19", "avancos": ["Arquitetura do workflow ApuracaoFiscal validada com Jorge — sem impedimentos", "BHules consolidado como fonte da verdade dos insumos de notas", "Bugs críticos de classificação resolvidos (FIS-336, FIS-338); FIS-191 concluída"], "bloqueios": ["Inconsistências de classificação em produção (CST SN, CFOP 5929) ameaçam o first-time-right ≥95%"], "pendencias": ["Concluir correções do BHules e reprocessar (FIS-342)", "Refinar issues do Motor de Cálculo (FIS-329/330/331)", "Decidir continuidade do robô de ECD (FIS-347)"]}, {"proj": "rpa-fiscal", "data": "2026-06-19", "avancos": ["Módulo único de consulta Nacional em revisão (10 municípios)", "Escrituração SBC via Nacional concluída", "Painel RPA de controle interno em revisão"], "bloqueios": [], "pendencias": ["Concluir módulo Nacional e testes por município (FIS-351)", "Finalizar Guia ISS SP (FIS-285)", "Provisionar infra do dashboard (FIS-232)"]}, {"proj": "motor-trabalhista", "data": "2026-06-19", "avancos": ["Motor de envio ao eSocial em construção (DP-101)", "Validação de relatórios desbloqueada (DP-100); Extrato Mensal em dev (DP-133)", "Cálculo de folha (DP-3) em revisão; arquitetura DP↔Hub alinhada"], "bloqueios": ["Base de DEV sem dados de produção (Dan/Felipe — requer CPO)", "Acesso à API DataPrev do consignado (externo)"], "pendencias": ["Atualizar base dev com dados reais (desbloqueio crítico)", "Concluir motor eSocial (DP-101)", "Finalizar Plano B do consignado (DP-91/DP-93)"]}, {"proj": "motor-contabil", "data": "2026-06-19", "avancos": ["Backlog de Q2 (E1–E8) totalmente estruturado no Linear", "Discovery da jornada concluído (CTB-1); spike do Ledger Midaz (CTB-3)", "Acesso ao Git destravado; spec dos relatórios criada (CTB-92)"], "bloqueios": ["Decisões técnicas D1–D5 (comitê, prazo 20/06)", "Ledger Midaz na AWS dev (Paulo Dias, prazo 20/06)"], "pendencias": ["Validar backlog com Fernando e Jorge", "Fechar E1 — decisões de arquitetura (CTB-68)", "Iniciar spec dos relatórios (CTB-92)"]}, {"proj": "solicitacoes-dp", "data": "2026-06-19", "avancos": ["Importação das admissões na Domínio destravada e validada ponta a ponta", "V1 fechada — entra em produção esta semana (M1 em 85%)", "Arquitetura que liga a experiência ao Autopilot definida"], "bloqueios": ["Aplicação de regras de DP (~365 regras) sem capacidade de eng até julho — ameaça o gate do Autopilot", "Confiabilidade do dado da Domínio (defasagem ~10 dias)"], "pendencias": ["Abrir piloto em produção (Carnevale/BLN)", "Estruturar a aplicação de regras de DP", "Re-teste da importação para férias/rescisão"]}, {"proj": "triagem-ocr", "data": "2026-06-19", "avancos": ["Camada de segurança antivírus (GuardDuty) entregue no pipeline", "Exibição de categoria e racional do OCR ao operador", "M2 (top 5 tipos roteados) entregue em 17/06"], "bloqueios": [], "pendencias": ["Validar NFS-e SP em lote (COCKPIT-305)", "Padronizar fixtures do XMLFiscalParser (COCKPIT-306)", "Fechar M3 (60% dos tipos) até 30/06"]}, {"proj": "copiloto-samurai", "data": "2026-06-19", "avancos": ["M1 (casos de uso + governança) — produto tecnicamente desenvolvido"], "bloqueios": ["Único responsável (Daniel) indisponível — projeto parado, sem previsão de retomada", "Depende do Projeto Contexto"], "pendencias": ["Retomar com alocação dedicada do Daniel", "Publicar modelo de casos de uso + governança (HITL)"]}, {"proj": "bpo-financeiro", "data": "2026-06-19", "avancos": ["SSO Microsoft p/ Agrocontar (pré-requisito de acesso)", "Análise do Excel financeiro de 78 abas iniciada"], "bloqueios": ["Faturamento não padronizado (pagamentos fora do sistema) impede definir o escopo"], "pendencias": ["Reunião Lucas + Daniel sobre faturamento (20/06)", "Mapear regras/exceções (27/06)", "Fechar discovery M1 (30/06)"]}]};

<style>
  :root{--navy:#0F1727;--navy7:#1a2438;--blue:#0171E4;--blue7:#005bb8;--purple:#9f8ff0;--beige-soft:#F4F1E8;--red:#F25461;--amber:#f59e0b;--green:#16a34a;--text:#0F1727;--muted:#5b6478;--border:#e6e3d9;}

  .hero .mini .l{font-size:.52rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem;font-family:'Roboto'}

  @media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:auto}.kpi-hero-sec{flex-direction:column}.hero{width:100%}}
  .kpi{background:#fff;border:1px solid var(--border);border-radius:1.1rem;padding:1rem 1.15rem;display:flex;flex-direction:column;justify-content:space-between;gap:.45rem}
  .kpi .top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
  .kpi .lab{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;font-family:'Roboto'}
  .kpi .ic{width:30px;height:30px;border-radius:.6rem;display:grid;place-items:center;flex-shrink:0;font-size:.95rem}
  .kpi .ic.blue{background:#dde9fa}.kpi .ic.green{background:#dcfce7}.kpi .ic.red{background:#fde0e3}.kpi .ic.amber{background:#fef3c7}.kpi .ic.purple{background:#ede9fe}
  .kpi .val{font-size:1.8rem;font-weight:700;font-family:'Roboto';color:var(--navy);line-height:1}

  .card-h .l{display:flex;align-items:center;gap:.55rem}.card-h .ic{width:26px;height:26px;border-radius:.45rem;background:#f1f5f9;display:grid;place-items:center}

  table{border-collapse:collapse;width:100%}
  th,td{border:1px solid var(--border);font-size:.85rem;vertical-align:middle;padding:.6rem .7rem}

  .ref{font-family:'Roboto';font-weight:700;font-size:.72rem;color:var(--blue);margin-right:.4rem}
  td.st{text-align:center;padding:.45rem .5rem;width:130px}
  .pill{display:inline-block;border-radius:.4rem;padding:.42rem .7rem;font-family:'Roboto';font-weight:600;font-size:.8rem;color:#fff;min-width:96px}
  .st-ontrack{background:var(--blue)}.st-done{background:var(--green)}.st-late{background:var(--red)}.st-pend{background:#94a3b8}
  .st-empty{color:#b6b09a;font-size:1rem}
  .pct-wrap{display:flex;align-items:center;gap:.5rem;min-width:120px}
  .pct-bar{flex:1;height:6px;background:#eceadf;border-radius:99px;overflow:hidden}.pct-bar>i{display:block;height:100%;border-radius:99px}
  .hbadge{font-size:.66rem;font-weight:700;font-family:'Roboto';padding:.18rem .55rem;border-radius:99px;white-space:nowrap}
  .h-ok{background:#dcfce7;color:#166534}.h-risco{background:#fef3c7;color:#92400e}.h-off{background:#fee2e2;color:#991b1b}
  .okr{font-size:.62rem;font-weight:700;font-family:'Roboto';padding:.16rem .5rem;border-radius:99px;background:#ede9fe;color:#5b21b6;white-space:nowrap}
  .proj-row{cursor:pointer;transition:background .12s}.proj-row:hover{background:#f5f6fb}.proj-row:hover .pname{color:var(--blue)}
  .pname{font-weight:600;font-family:'Roboto';color:var(--navy)}.open-hint{font-size:.7rem;color:var(--blue);font-weight:600}
  .subtabs{display:flex;gap:.25rem;border-bottom:1px solid var(--border);margin:0 0 1.1rem}
  .subtab{padding:.6rem 1rem;font-size:.86rem;font-weight:600;color:var(--muted);font-family:'Roboto';border-bottom:2px solid transparent;cursor:pointer}
  .subtab:hover{color:var(--navy)}.subtab.active{color:var(--navy);border-bottom-color:var(--blue)}
  .subview{display:none}.subview.active{display:block}
  .raid{border:1px solid var(--border);border-radius:.9rem;padding:.9rem 1rem;background:#fcfbf7;margin-bottom:.9rem}
  .raid .rtitle{font-family:'Roboto';font-weight:700;color:var(--navy);font-size:.95rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .sev{font-size:.6rem;padding:.12rem .5rem;border-radius:99px;font-weight:700;font-family:'Roboto';text-transform:uppercase;letter-spacing:.04em;background:#fef3c7;color:#92400e}
  .raid .meta{font-size:.73rem;color:var(--muted);margin:.45rem 0 .65rem;display:flex;gap:.85rem;flex-wrap:wrap}
  .aspect{display:flex;gap:.5rem;font-size:.8rem;padding:.38rem 0;border-top:1px dashed var(--border)}
  .aspect .k{flex:0 0 96px;font-weight:700;font-family:'Roboto';font-size:.66rem;text-transform:uppercase;letter-spacing:.04em}
  .k-r{color:#9a3412}.k-i{color:#991b1b}.k-d{color:#5b21b6}.k-p{color:#075985}.k-m{color:#166534}
  .empty{text-align:center;color:var(--muted);padding:2.2rem 1rem}
  .empty .eic{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#ede9fe,#dde9fa);display:grid;place-items:center;margin:0 auto .8rem;font-size:1.4rem}
  .legend{display:flex;gap:1rem;flex-wrap:wrap;font-size:.74rem;color:var(--muted);margin-top:.7rem}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:.3rem;vertical-align:middle}
  .back{font-size:.82rem;color:var(--blue);cursor:pointer;font-weight:600;font-family:'Roboto';margin-bottom:.6rem;display:inline-block}
  .mstone{display:flex;align-items:center;gap:.8rem;background:#fcfbf7;border:1px solid var(--border);border-radius:.8rem;padding:.7rem .9rem;margin-bottom:1rem}
  .mstone .mp{font-family:'Roboto';font-weight:700;color:var(--navy);font-size:1.05rem}
  .note{font-size:.85rem;color:var(--text);background:#f8f9fc;border:1px solid var(--border);border-radius:.7rem;padding:.7rem .85rem;margin-bottom:1rem}
  .chips{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin-bottom:.9rem}
  .fchip{font-size:.78rem;font-weight:600;font-family:'Roboto';padding:.35rem .75rem;border-radius:99px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;transition:all .12s}
  .fchip:hover{border-color:var(--blue)} .fchip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .chips select{border:1px solid var(--border);border-radius:.6rem;padding:.38rem .6rem;font-size:.8rem;font-family:inherit;background:#fff;color:var(--text)}
  .mtx th{min-width:62px;font-size:.6rem;padding:.4rem .35rem}
  .mtx td.st{width:62px;padding:.3rem .25rem}
  .mtx .pill{min-width:0;padding:.26rem .38rem;font-size:.68rem}
  .mtx .st-empty{font-size:.85rem}
  .mtx td:nth-child(2){min-width:210px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">

      <svg class="logo" viewBox="0 0 40 40" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M35.3985 0H4.16432C3.01466 0 1.97449 0.472325 1.219 1.23247C0.467163 1.99631 0 3.04797 0 4.21033V35.7897C0 36.952 0.467163 38.0037 1.219 38.7675C1.97084 39.5314 3.01466 40 4.16432 40H35.3985C36.5482 40 37.5884 39.5277 38.3439 38.7675C39.0993 38.0074 39.5629 36.952 39.5629 35.7897V4.21033C39.5629 3.04797 39.0957 1.99631 38.3439 1.23247C37.592 0.472325 36.5482 0 35.3985 0ZM11.5404 30.1661C11.1316 30.5793 10.5951 30.786 10.0586 30.786C9.52209 30.786 8.98559 30.5793 8.57682 30.1661L6.12421 27.6863L3.67161 25.2066C3.26284 24.7934 3.05846 24.2509 3.05846 23.7048C3.05846 23.1587 3.26284 22.6199 3.67161 22.2066L6.86511 18.9779L10.0586 15.7491L13.993 19.7269L17.9274 23.7048L14.7339 26.9336L11.5404 30.1624V30.1661ZM11.8689 13.9594L15.0368 10.7565L18.2048 7.5535C18.6281 7.12546 19.1829 6.91144 19.7413 6.91144C20.2997 6.91144 20.8508 7.12546 21.2778 7.5535L24.4458 10.7565L27.6137 13.9594L23.6793 17.9373L19.7449 21.9151L15.8105 17.9373L11.8762 13.9594H11.8689ZM35.8146 25.1255L33.2781 27.69L30.7415 30.2546C30.3546 30.6458 29.8473 30.8413 29.34 30.8413C28.8327 30.8413 28.3254 30.6458 27.9385 30.2546L24.7012 26.9816L21.4639 23.7085L25.3983 19.7306L29.3327 15.7528L32.57 19.0258L35.8073 22.2989C36.1942 22.69 36.3876 23.2029 36.3876 23.7159C36.3876 24.2288 36.1942 24.7417 35.8073 25.1328L35.8146 25.1255Z"/></svg>

      <p style="font-size:.72rem;color:var(--muted);margin-top:.8rem">BHub Tech · Projetos Tech por squad + OKR + saúde · dados no bloco <code>DADOS</code>.</p>

<script>
/* ===== LÓGICA ===== */
const STATUS_PCT = {"Pendente":0,"Triage":0,"Refinado":10,"Em andamento":50,"Em revisão":80,"Concluído":100,"Cancelado":null};
const AREA_COLORS = {"Fiscal":"#0171E4","Engenharia":"#16a34a","Produto/Design":"#5b21b6","DP":"#be123c","Contábil":"#7c3aed","Cockpit":"#92400e","Hub":"#0891b2"};
const ROTULO_SQUAD = "Squad";
const squad = a => ROTULO_SQUAD + " " + a;
const hoje = new Date();
const okrNome = id => (DADOS.okrs.find(o=>o.id===id)||{}).nome || "";

function pctOf(t){ const p = STATUS_PCT[t.status]; return (p===undefined?0:p); }
function ativa(t){ return t.status !== "Cancelado"; }
const hojeISO = new Date().toISOString().slice(0,10);
function atrasada(t){ return t.venc && t.status!=="Concluído" && t.venc < hojeISO; }
function projPct(p){
  let v;
  if(p.pctLinear!=null) v=p.pctLinear; // % do milestone no Linear (report semanal)
  else { const ts=(p.tarefas||[]).filter(ativa).filter(t=>!t.entrega); v = ts.length?Math.round(ts.reduce((s,t)=>s+(pctOf(t)||0),0)/ts.length):(p.pctManual!=null?p.pctManual:0); }
  return v; // % real do milestone do Linear (sem teto — 100% permitido)
}
function pctColor(p){ return p>=70?"var(--green)":p>=30?"var(--amber)":"var(--red)"; }
function healthClass(h){ return h==="No prazo"?"h-ok":h==="Em risco"?"h-risco":"h-off"; }
function healthDot(h){ return h==="No prazo"?"var(--green)":h==="Em risco"?"var(--amber)":"var(--red)"; }
// Régua: a "situação" do deck (On track / Done / Atrasado / Pendente), calculada
// em relação à DATA ALVO (venc). Concluído=Done · venc no passado e não concluído=Atrasado.
function statusPill(t){
  if(t.status==="Cancelado") return '<span class="st-empty">cancelado</span>';
  if(t.status==="Concluído") return '<span class="pill st-done">Done</span>';
  if(atrasada(t)) return '<span class="pill st-late">Atrasado</span>';
  if(t.status==="Pendente"||t.status==="Triage") return '<span class="pill st-pend">Pendente</span>';
  return '<span class="pill st-ontrack">On track</span>';
}
function fmt(d){ if(!d)return"—"; const [y,m,dd]=d.split("-"); return dd+"/"+m+"/"+y; }
// Célula de Data alvo: vermelho se atrasada (passou da data e não concluída).
function vencCell(t){ if(!t.venc) return '<span style="color:var(--muted)">A definir</span>'; return atrasada(t)?`<span style="color:var(--red);font-weight:700">${fmt(t.venc)}</span>`:fmt(t.venc); }

function portfolio(){
  let total=0,done=0,andamento=0,raid=0,ok=0,risco=0,off=0;
  DADOS.projetos.forEach(p=>{
    (p.tarefas||[]).forEach(t=>{ if(!ativa(t)||t.entrega)return; total++; if(t.status==="Concluído")done++; else if(["Em andamento","Em revisão","Refinado"].includes(t.status))andamento++; });
    raid += (p.raid||[]).filter(r=>r.status!=="fechado").length;
    if(p.health==="No prazo")ok++; else if(p.health==="Em risco")risco++; else if(p.health==="Off track")off++;
  });
  const deps = (DADOS.dependencias||[]).length;
  const pct = Math.round(DADOS.projetos.reduce((s,p)=>s+projPct(p),0)/DADOS.projetos.length);
  return {total,done,andamento,raid,deps,ok,risco,off,pct,nProj:DADOS.projetos.length};
}
function depBadge(s){
  const m={"Triage":"#94a3b8","Pendente":"#92400e","A iniciar":"#005bb8","Em curso":"#166534","Concluído":"#166534"};
  const bg={"Triage":"#f1f5f9","Pendente":"#fef3c7","A iniciar":"#dde9fa","Em curso":"#dcfce7","Concluído":"#dcfce7"};
  return `<span class="hbadge" style="background:${bg[s]||'#f1f5f9'};color:${m[s]||'#475569'}">${s}</span>`;
}

document.getElementById('brandtxt').innerHTML = DADOS.empresa+' <span class="b">Tech</span>';

function barLine(label,pc,extra){return `<div style="margin-bottom:.8rem"><div style="display:flex;justify-content:space-between;font-size:.84rem"><span style="font-weight:600;font-family:'Roboto'">${label}${extra||''}</span><span style="color:var(--muted)">${pc}%</span></div><div class="pct-bar" style="margin-top:.35rem"><i style="width:${pc}%;background:${pctColor(pc)}"></i></div></div>`;}

function renderDashboard(){
  const m=portfolio();
  document.getElementById('view-dashboard').innerHTML = `
    <div class="pghead"><div><h1>${DADOS.workspace}</h1><div class="st">Resumo executivo do portfólio • ${m.nProj} projetos (Autopilot + Cockpit + Hub) • dados e reportes do Linear · 19/06</div></div></div>
    <div class="kpi-hero-sec">
      <div class="hero"><div class="lab">% Conclusão<br>média do portfólio</div>
        <div><div class="big">${m.pct}%</div><div class="bar"><i style="width:${m.pct}%"></i></div><div class="cap">média do % de avanço (milestone) dos ${m.nProj} projetos — reporte semanal</div></div>
        <div class="mini"><div><div class="v" style="color:#86efac">${m.ok}</div><div class="l">No prazo</div></div><div><div class="v" style="color:#fcd34d">${m.risco}</div><div class="l">Risco</div></div><div><div class="v" style="color:#fca5a5">${m.off}</div><div class="l">Off</div></div></div>
      </div>
      <div class="kpi-grid">
        <div class="kpi"><div class="top"><span class="lab">Projetos</span><span class="ic purple">📁</span></div><div class="val">${m.nProj}</div><div class="sub">5 squads · Autopilot + Cockpit + Hub</div></div>
        <div class="kpi"><div class="top"><span class="lab">No prazo</span><span class="ic green">✓</span></div><div class="val green">${m.ok}</div><div class="sub">saúde verde no Linear</div></div>
        <div class="kpi"><div class="top"><span class="lab">Em risco</span><span class="ic amber">⚠️</span></div><div class="val amber">${m.risco}</div><div class="sub">saúde amarela no Linear</div></div>
        <div class="kpi"><div class="top"><span class="lab">Off track</span><span class="ic red">⏰</span></div><div class="val red">${m.off}</div><div class="sub">${m.off?'projetos off track':'nenhum off track'}</div></div>
        <div class="kpi"><div class="top"><span class="lab">Bloqueios & Dependências</span><span class="ic amber">🔗</span></div><div class="val amber">${m.deps}</div><div class="sub">cross-time c/ issues no Linear</div></div>
        <div class="kpi"><div class="top"><span class="lab">Ações de Mitigação</span><span class="ic purple">⚑</span></div><div class="val">${m.raid}</div><div class="sub">ações em aberto</div></div>
      </div>
    </div>
    <div class="row2">
      <div class="card"><div class="card-h"><span class="l"><span class="ic">👥</span> Conclusão por squad</span></div><div class="card-b" id="bygrupo"></div></div>
      <div class="card"><div class="card-h"><span class="l"><span class="ic">🎯</span> Conclusão por objetivo (OKR)</span></div><div class="card-b" id="byokr"></div></div>
    </div>
    <div class="card"><div class="card-h"><span class="l"><span class="ic">🧩</span> Conclusão por tema agregador</span><span style="font-weight:400;color:var(--muted);font-size:.78rem">Autopilot = agregação de projetos de várias squads</span></div><div class="card-b" id="bytema"></div></div>`;
  document.getElementById('bygrupo').innerHTML = DADOS.grupos.map(g=>{
    const ps=DADOS.projetos.filter(p=>p.grupo===g); const pc=ps.length?Math.round(ps.reduce((s,p)=>s+projPct(p),0)/ps.length):0;
    const tms=[...new Set(ps.map(p=>p.tema).filter(Boolean))];
    const lbl=g+(tms.length?` <span style="color:var(--purple);font-weight:600">(${tms.join(", ")})</span>`:"");
    return barLine(lbl,pc,` <span style="color:var(--muted);font-weight:400">· ${ps.length}</span>`);
  }).join('');
  document.getElementById('byokr').innerHTML = DADOS.okrs.map(o=>{
    const ps=DADOS.projetos.filter(p=>p.okr===o.id); if(!ps.length)return''; const pc=Math.round(ps.reduce((s,p)=>s+projPct(p),0)/ps.length);
    return barLine(o.id+' · '+o.nome,pc,` <span style="color:var(--muted);font-weight:400">· ${ps.length}</span>`);
  }).join('');

  const bt=document.getElementById('bytema');
  if(bt) bt.innerHTML=(DADOS.temas||[]).map(tm=>{ const ps=DADOS.projetos.filter(p=>p.tema===tm); const pc=ps.length?Math.round(ps.reduce((s,p)=>s+projPct(p),0)/ps.length):0; const sq=[...new Set(ps.map(p=>p.grupo))]; return barLine(tm,pc,` <span style="color:var(--muted);font-weight:400">· ${ps.length} projetos · ${sq.join(", ")}</span>`); }).join('') || '<div style="color:var(--muted);font-size:.85rem">Sem temas agregadores.</div>';
}

function renderOKR(){
  const body = DADOS.okrs.map(o=>{
    const ps=DADOS.projetos.filter(p=>p.okr===o.id);
    if(!ps.length)return'';
    const chips = ps.map(p=>`<div onclick="openDealById('${p.id}')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:.5rem;border:1px solid var(--border);border-radius:.6rem;padding:.5rem .7rem;margin-bottom:.4rem;background:#fff">
        <span style="font-family:'Roboto';font-weight:600;font-size:.84rem">${p.nome}</span>
        <span style="display:flex;align-items:center;gap:.5rem"><span class="hbadge ${healthClass(p.health)}">${p.health}</span><span style="font-size:.75rem;color:var(--muted)">${projPct(p)}%</span></span>
      </div>`).join('');
    return `<div class="card"><div class="card-h"><span class="l"><span class="okr">${o.id}</span> ${o.nome}</span><span class="card-h"></span><span style="font-size:.78rem;color:var(--muted)">${ps.length} projeto(s)</span></div><div class="card-b">${chips}</div></div>`;
  }).join('');
  document.getElementById('view-okr').innerHTML = `
    <div class="pghead"><div><h1>Os grandes objetivos</h1><div class="st">Onde cada projeto entrega valor · cor = saúde no Linear</div></div></div>${body}`;
}

let EXECV = (function(){try{return localStorage.getItem('execv')||'board';}catch(e){return 'board';}})();
function setExecV(v){ EXECV=v; try{localStorage.setItem('execv',v);}catch(e){} renderExec(); }
function entregasOf(p){ return (p.tarefas||[]).filter(t=>t.entrega); }
function eKids(p,ref){ return (p.tarefas||[]).filter(ativa).filter(t=>t.parent===ref); }
function eInfo(p,e){
  const ch=eKids(p,e.ref);
  const done=ch.filter(c=>c.status==='Concluído').length;
  const pct=ch.length?Math.round(ch.reduce((a,c)=>a+(pctOf(c)||0),0)/ch.length):(pctOf(e)||0);
  const atras=atrasada(e)||ch.some(c=>atrasada(c));
  return {ch,done,total:ch.length,pct,atras};
}
function execKPIs(){
  const projs=DADOS.projetos;
  const pct=Math.round(projs.reduce((s,p)=>s+projPct(p),0)/projs.length);
  let atras=0; projs.forEach(p=>{(p.tarefas||[]).filter(ativa).filter(t=>!t.entrega).forEach(t=>{if(atrasada(t))atras++;});});
  const bloq=(DADOS.dependencias||[]).length;
  return {n:projs.length,pct,atras,bloq};
}
function kpiBox(l,v,c){ return `<div style="background:#f4f5f7;border:1px solid var(--border);border-radius:.7rem;padding:.7rem .9rem"><div style="font-size:.72rem;color:var(--muted)">${l}</div><div style="font-size:1.55rem;font-weight:800;color:${c||'var(--navy)'}">${v}</div></div>`; }
function dot(c){ return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c}"></span>`; }
function dateBR(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }

function execBoard(){
  const projs=DADOS.projetos;
