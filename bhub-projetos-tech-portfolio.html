    const es=entregasOf(p); const pc=projPct(p);
    let atras=0; (p.tarefas||[]).filter(ativa).filter(t=>!t.entrega).forEach(t=>{if(atrasada(t))atras++;});
    const bloq=(DADOS.dependencias||[]).filter(d=>(d.projetos||[]).includes(p.id)).length;
    const issues=(p.tarefas||[]).filter(t=>!t.entrega).length;
    const rows=es.map(e=>{ const info=eInfo(p,e);
      const ic=info.atras?dot('var(--red)'):info.pct>=100?dot('var(--green)'):info.pct>0?dot('var(--blue)'):dot('#cbd5e1');
      const en=(e.nome.match(/^E\d+/)||[''])[0]; const nm=e.nome.replace(/^E\d+\s*·?\s*/,'');
      return `<div style="display:flex;align-items:center;gap:.5rem;padding:.16rem 0;font-size:.79rem">
        <span style="width:10px;text-align:center">${ic}</span>
        <span style="font-weight:700;color:var(--navy);min-width:20px">${en}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.nome}">${nm}</span>
        <span style="width:58px"><span class="pct-bar" style="display:block;height:5px"><i style="width:${info.pct}%;background:${pctColor(info.pct)}"></i></span></span>
        <span style="color:var(--muted);font-size:.71rem;min-width:28px;text-align:right">${info.done}/${info.total}</span></div>`;
    }).join('');
    return `<div class="card" style="cursor:pointer;padding:1rem 1.1rem" onclick="openDeal(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem">
        <span class="pname" style="font-size:.95rem">${p.nome.split('—')[0].trim()}</span>
        <span class="hbadge ${healthClass(p.health)}">${p.health}</span></div>
      <div style="font-size:.71rem;color:var(--muted);margin:.2rem 0 .6rem">${p.grupo} · ${es.length} entregas · ${issues} issues</div>
      <div class="pct-wrap" style="margin-bottom:.2rem"><span class="pct-bar"><i style="width:${pc}%;background:${pctColor(pc)}"></i></span><span style="font-size:.78rem;font-weight:700;color:var(--navy)">${pc}%</span></div>
      ${p.marcoLinear?`<div style="font-size:.64rem;color:var(--muted);margin-bottom:.55rem">% Linear · ${p.marcoLinear}</div>`:'<div style="margin-bottom:.55rem"></div>'}
      <div>${rows||'<div style="color:var(--muted);font-size:.78rem">Sem entregas cadastradas</div>'}</div>
      <div style="margin-top:.6rem;padding-top:.5rem;border-top:1px solid var(--border);font-size:.74rem;color:var(--muted)">
        <span style="color:${atras?'var(--red)':'var(--muted)'};font-weight:${atras?700:400}">${atras} atrasada${atras===1?'':'s'}</span> ·
        <span style="color:${bloq?'#92400e':'var(--muted)'};font-weight:${bloq?700:400}">${bloq} bloqueio${bloq===1?'':'s'}</span></div></div>`;
  }).join('');
  return `<div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem">${cards}</div>`;
}

function eDates(p,e,info){
  let end = e.venc? new Date(e.venc) : null;
  if(!end){ const cv=info.ch.map(c=>c.venc).filter(Boolean).sort(); if(cv.length) end=new Date(cv[cv.length-1]); }
  if(!end) return null;
  let start = e.inicio? new Date(e.inicio) : null;
  if(!start){ const dur=(info.pct>=100?21:info.pct>0?28:14)*864e5; start=new Date(end.getTime()-dur); }
  if(start>=end) start=new Date(end.getTime()-14*864e5);
  return {start,end};
}
function execGantt(){
  const projs=DADOS.projetos;
  let min=null,max=null;
  projs.forEach(p=>entregasOf(p).forEach(e=>{const info=eInfo(p,e);const d=eDates(p,e,info);if(d){if(!min||d.start<min)min=d.start;if(!max||d.end>max)max=d.end;}}));
  projs.forEach(p=>{if(!entregasOf(p).length&&p.inicio&&p.alvo){const a=new Date(p.inicio),b=new Date(p.alvo);if(!min||a<min)min=a;if(!max||b>max)max=b;}});
  const today=new Date();
  if(!min)min=new Date(today); if(!max)max=new Date(today.getTime()+60*864e5);
  if(today<min)min=new Date(today); if(today>max)max=new Date(today);
  min=new Date(min.getTime()-5*864e5); max=new Date(max.getTime()+10*864e5);
  const span=(max-min)||1;
  const pos=d=>Math.max(0,Math.min(100,((d-min)/span)*100));
  const MES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const ticks=[]; let c=new Date(min.getFullYear(),min.getMonth(),1);
  while(c<=max){ticks.push(new Date(c));c=new Date(c.getFullYear(),c.getMonth()+1,1);}
  const tp=pos(today);
  // ===== Ciclos (quinzenas) — EDITÁVEL: âncora = início do Ciclo 3 (08/06), 14 dias =====
  const CIC_ANCHOR=new Date(2026,5,8), CIC_DIAS=14, CIC_NUM=3;
  let cs0=new Date(CIC_ANCHOR); while(cs0>min) cs0=new Date(cs0.getTime()-CIC_DIAS*864e5);
  const cics=[]; for(let cs=new Date(cs0); cs<max; cs=new Date(cs.getTime()+CIC_DIAS*864e5)){
    const num=CIC_NUM+Math.round((cs-CIC_ANCHOR)/(CIC_DIAS*864e5));
    if(num>=1) cics.push({s:new Date(cs), e:new Date(cs.getTime()+CIC_DIAS*864e5), num});
  }
  const curCic=cics.find(k=>k.s<=today&&today<k.e);
  const cicShade=cics.map((k,i)=> (k===curCic)
    ? `<div style="position:absolute;left:${pos(k.s)}%;width:${pos(k.e)-pos(k.s)}%;top:0;bottom:0;background:rgba(1,113,228,.07)"></div>`
    : (i%2 ? `<div style="position:absolute;left:${pos(k.s)}%;width:${pos(k.e)-pos(k.s)}%;top:0;bottom:0;background:rgba(15,23,42,.022)"></div>` : '')).join('');
  const cicLines=cics.map(k=>`<div style="position:absolute;left:${pos(k.s)}%;top:0;bottom:0;border-left:1px dashed var(--border)"></div>`).join('');
  const cicLab=cics.map(k=>{const c=(pos(k.s)+pos(k.e))/2; return `<div style="position:absolute;left:${c}%;bottom:4px;transform:translateX(-50%);font-size:.6rem;font-weight:700;color:${k===curCic?'var(--blue)':'#94a3b8'}">C${k.num}</div>`;}).join('');
  const grid=ticks.map(t=>`<div style="position:absolute;left:${pos(t)}%;top:0;bottom:0;width:1px;background:var(--border)"></div>`).join('');
  const hdr=ticks.map(t=>`<div style="position:absolute;left:${pos(t)}%;top:4px;font-size:.68rem;font-weight:700;color:var(--navy);transform:translateX(3px)">${MES[t.getMonth()]}${t.getMonth()===0?'/'+String(t.getFullYear()).slice(2):''}</div>`).join('');
  let L='', R='';
  L+=`<div style="height:46px"></div>`;
  R+=`<div style="position:relative;height:46px;border-bottom:1px solid var(--border)">${hdr}${cicLab}</div>`;
  projs.forEach((p,pIdx)=>{
    if(pIdx>0){const sep='<div style="height:11px;border-top:1px dashed #cbd5e1;margin-top:5px"></div>';L+=sep;R+=sep;}
    L+=`<div style="height:24px;display:flex;align-items:flex-end;font-weight:700;font-size:.67rem;color:var(--muted);letter-spacing:.03em">${p.nome.split('—')[0].trim().toUpperCase()}</div>`;
    R+=`<div style="height:24px"></div>`;
    const es=entregasOf(p);
    if(es.length){ es.forEach(e=>{const info=eInfo(p,e);const d=eDates(p,e,info);
      const en=(e.nome.match(/^E\d+/)||[''])[0]; const nm=e.nome.replace(/^E\d+\s*·?\s*/,'');
      const eLate = info.atras;
      const doneLate = info.pct>=100 && e.venc && e.venc < hojeISO;
      const col=eLate?'var(--red)':info.pct>=100?'var(--green)':info.pct>0?'var(--blue)':'#94a3b8';
      L+=`<div style="height:21px;display:flex;align-items:center;font-size:.74rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.nome}"><b style="color:var(--navy);margin-right:.3rem">${en}</b>${nm}</div>`;
      let bar;
      if(d){const l=pos(d.start),w=Math.max(2.5,pos(d.end)-pos(d.start));
        bar=`<div style="position:absolute;left:${l}%;width:${w}%;top:4px;height:12px;border-radius:4px;background:${col};opacity:${info.pct>0?1:.5};${doneLate?'box-shadow:0 0 0 1.5px var(--red)':''}" title="${dateBR(d.start)} → ${dateBR(d.end)}${doneLate?' · concluída em atraso':''}"></div><div style="position:absolute;left:${l}%;margin-left:calc(${w}% + 5px);top:3px;font-size:.65rem;color:var(--muted);white-space:nowrap"><b style="color:var(--navy)">${info.pct}%</b> · ${info.done}/${info.total}</div>`;
      } else { bar=`<div style="position:absolute;left:${tp}%;top:3px;margin-left:5px;font-size:.65rem;color:var(--muted);font-style:italic">a definir</div>`; }
      R+=`<div style="position:relative;height:21px">${bar}</div>`;
    }); }
    else {
      const pc=projPct(p); const hcol=p.health==='No prazo'?'var(--green)':p.health==='Off track'?'var(--red)':'var(--amber)';
      L+=`<div style="height:21px;display:flex;align-items:center;font-size:.72rem;color:var(--muted);white-space:nowrap">projeto · sem entregas detalhadas</div>`;
      let bar;
      if(p.inicio&&p.alvo){const a=new Date(p.inicio),b=new Date(p.alvo);const l=pos(a),w=Math.max(2.5,pos(b)-pos(a));
        bar=`<div style="position:absolute;left:${l}%;width:${w}%;top:4px;height:12px;border-radius:4px;background:${hcol};opacity:.85" title="${dateBR(a)} → ${dateBR(b)} · ${p.health}"></div><div style="position:absolute;left:${l}%;margin-left:calc(${w}% + 5px);top:3px;font-size:.65rem;color:var(--muted);white-space:nowrap"><b style="color:var(--navy)">${pc}%</b> · ${p.statusProjeto||''}</div>`;
      } else { bar=`<div style="position:absolute;left:${tp}%;top:3px;margin-left:5px;font-size:.65rem;color:var(--muted);font-style:italic">sem datas</div>`; }
      R+=`<div style="position:relative;height:21px">${bar}</div>`;
    }
  });
  return `<div class="card" style="overflow-x:auto;padding:1rem 1.1rem">
    <div style="display:grid;grid-template-columns:185px 1fr;min-width:640px">
      <div>${L}</div>
      <div style="position:relative">${cicShade}${cicLines}${grid}<div style="position:absolute;left:${tp}%;top:0;bottom:0;width:2px;background:var(--blue);opacity:.55;z-index:3"></div>${R}</div>
    </div></div>
  <div class="legend"><span>${dot('var(--green)')}&nbsp;Concluída no prazo</span><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 1.5px var(--red)"></span>&nbsp;Concluída em atraso</span><span>${dot('var(--blue)')}&nbsp;Em andamento</span><span>${dot('#94a3b8')}&nbsp;Pendente</span><span>${dot('var(--red)')}&nbsp;Atrasada</span><span style="color:var(--muted)"><span style="display:inline-block;width:2px;height:11px;background:var(--blue);vertical-align:-1px;margin-right:4px"></span>hoje (${dateBR(today)})</span><span style="color:var(--muted)">C# = ciclo (quinzena) · faixa azul = ciclo atual</span></div>
  <div class="note">Datas reais das issues do Linear (Start/Due date), agregadas por entrega: <b>início</b> = menor data das filhas · <b>data alvo</b> = maior due das filhas. Entregas sem data alvo no Linear aparecem como “a definir”. Ciclos = quinzenas (C3 = 08–22/06); a âncora é configurável no código do Gantt.</div>`;
}

function execMatriz(){
  const mtasks=p=>{const tt=(p.tarefas||[]).filter(ativa).filter(t=>!t.entrega);return tt.length?tt:(p.marcos||[]).filter(ativa);};
  const projs=DADOS.projetos.filter(p=>mtasks(p).length);
  let n=0, rows='';
  DADOS.areas.forEach(area=>{
    const tasksArea=[];
    projs.forEach((p,pi)=>mtasks(p).filter(t=>t.area===area&&!t.entrega).forEach(t=>tasksArea.push({t,pi})));
    if(!tasksArea.length)return;
    rows+=`<tr class="area-band"><td colspan="${2+projs.length}"><span class="adot" style="background:${AREA_COLORS[area]||'#888'}"></span>${squad(area)}</td></tr>`;

      let cells=''; projs.forEach((p,j)=>{ cells+=`<td class="st">${j===pi?statusPill(t):'<span class="st-empty">—</span>'}</td>`; });
      rows+=`<tr><td class="num">${n}</td><td><span class="ref">${t.ref}</span>${t.nome}</td>${cells}</tr>`;
    });

  return `<div class="card mtx" style="overflow-x:auto"><table><thead><tr><th class="num">#</th><th>Tarefa</th>${projs.map(p=>`<th style="text-align:center;min-width:62px">${p.nome.split('—')[0].trim()}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="legend"><span><i style="background:var(--blue)"></i>On track</span><span><i style="background:var(--green)"></i>Done</span><span><i style="background:var(--red)"></i>Atrasado</span><span><i style="background:#94a3b8"></i>Pendente</span><span><i style="background:#efece2"></i>— sem a tarefa no projeto</span><span style="color:var(--muted)">Fiscal/DP/Contábil: tarefas do Linear · Cockpit/Hub: marcos do Linear</span></div>`;
}

function rEsc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdInline(t){
  t=rEsc(t);
  t=t.replace(/\\([\\`*_{}\[\]()#+\-.!~|])/g,'$1');
  t=t.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--blue)">$1</a>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/`([^`]+)`/g,'<code style="background:#f1f0ea;padding:0 .25rem;border-radius:3px">$1</code>');
  return t;
}
function repTable(rows){
  const cells=rows.map(r=>r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim()));
  const body=cells.filter(r=>!r.every(c=>/^[-: ]*$/.test(c)));
  if(!body.length) return '';
  const head=body[0], rest=body.slice(1);
  return '<table style="width:100%;border-collapse:collapse;font-size:.78rem;margin:.4rem 0"><thead><tr>'+head.map(c=>'<th style="text-align:left;border-bottom:1px solid var(--border);padding:.3rem .4rem;color:var(--muted)">'+mdInline(c)+'</th>').join('')+'</tr></thead><tbody>'+rest.map(r=>'<tr>'+r.map(c=>'<td style="border-bottom:1px solid var(--border);padding:.3rem .4rem;vertical-align:top">'+mdInline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
}
function mdLite(md){
  const lines=md.split('\n'); let html='', i=0, inUl=false;
  const closeUl=()=>{if(inUl){html+='</ul>';inUl=false;}};
  while(i<lines.length){
    let ln=lines[i];
    if(ln.indexOf('|')>=0 && ln.split('|').length>2){
      const tb=[]; while(i<lines.length && lines[i].indexOf('|')>=0){tb.push(lines[i]);i++;}
      closeUl(); html+=repTable(tb); continue;
    }
    if(/^#{1,4}\s/.test(ln)){ closeUl(); const lvl=ln.match(/^#+/)[0].length; html+='<div style="font-family:Roboto;font-weight:700;font-size:'+(lvl<=2?'.95rem':'.85rem')+';margin:.7rem 0 .3rem">'+mdInline(ln.replace(/^#{1,4}\s/,''))+'</div>'; i++; continue; }
    if(/^\s*[*\-]\s+/.test(ln)){ if(!inUl){html+='<ul style="margin:.2rem 0 .5rem;padding-left:1.1rem">';inUl=true;} html+='<li style="margin:.15rem 0">'+mdInline(ln.replace(/^\s*[*\-]\s+/,''))+'</li>'; i++; continue; }
    if(ln.trim()===''){ closeUl(); i++; continue; }
    closeUl(); html+='<p style="margin:.35rem 0">'+mdInline(ln)+'</p>'; i++;
  }
  closeUl(); return html;
}

let CWEEK=0;
function setCWEEK(d){ const wks=consolWeeks(); CWEEK=Math.max(0,Math.min(wks.length-1,CWEEK+d)); renderReports(); }
function isoWeekKey(iso){ const d=new Date(iso+'T00:00:00'); const t=new Date(d); t.setDate(t.getDate()+4-((t.getDay()+6)%7)); const ys=new Date(t.getFullYear(),0,1); const wk=Math.ceil((((t-ys)/86400000)+1)/7); return t.getFullYear()+'-W'+String(wk).padStart(2,'0'); }
function weekRange(iso){ const d=new Date(iso+'T00:00:00'); const dow=(d.getDay()+6)%7; const mon=new Date(d); mon.setDate(d.getDate()-dow); const sun=new Date(mon); sun.setDate(mon.getDate()+6); const f=x=>String(x.getDate()).padStart(2,'0')+'/'+String(x.getMonth()+1).padStart(2,'0'); return f(mon)+'–'+f(sun); }
function consolWeeks(){
  const all=(typeof REPORTS!=='undefined'?REPORTS:[]); const map={};
  all.forEach(r=>{ const k=isoWeekKey(r.data); if(!map[k])map[k]={key:k,ref:r.data,reps:{}}; const ex=map[k].reps[r.proj]; if(!ex||r.data>ex.data)map[k].reps[r.proj]=r; if(r.data>map[k].ref)map[k].ref=r.data; });
  return Object.values(map).sort((a,b)=>b.ref.localeCompare(a.ref));
}
function parseReport(body){
  const out={avancos:[],bloqueios:[],pendencias:[]};
  const cat=function(h){
    if(/evolu|progresso|entregue|entrega|avan[çc]o|conclu[ií]/i.test(h)) return 'avancos';
    if(/bloqueio|risco|depend|impedimento|decis[oõ]es necess/i.test(h)) return 'bloqueios';
    if(/pr[oó]xim|o que falta|foco da|a fazer|pend[eê]nc/i.test(h)) return 'pendencias';
    return null;
  };
  const push=function(b,t){ t=t.replace(/\*\*/g,'').replace(/^[\*\-•✅🔄⏳🟢🟡🔴\s]+/,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/`/g,'').replace(/^\[[ x]\]\s*/,'').trim(); if(t.length>4 && out[b].length<4 && t.indexOf('|')!==0) out[b].push(t); };
  const LBL=/^(?:\*\*)?\s*(Principais avan[çc]os|Avan[çc]os|O que foi entregue[^:*]*|Entregue[^:*]*|Entregas[^:*]*|Evolu[çc][ãa]o[^:*]*|Progresso[^:*]*|Bloqueios?[^:*]*|Riscos?[^:*]*|Gest[ãa]o de Riscos?[^:*]*|Depend[êe]ncias?[^:*]*|Impedimentos?[^:*]*|Pr[oó]ximos?[^:*]*|Pr[oó]ximos passos|Pend[êe]ncias[^:*]*|Foco[^:*]*|Decis[õo]es[^:*]*)\s*:(?:\*\*)?\s*(.*)$/i;
  let cur=null, gotSummary=false;
  body.split('\n').forEach(function(raw){
    let ln=raw.trim(); if(!ln) return;
    if(ln.indexOf('|')===0) return;
    const plain=ln.replace(/[#>`*]/g,'').trim();
    let mlab=ln.match(LBL);
    if(mlab){
      const b=cat(mlab[1]);
      if(b){ cur=b; const rest=(mlab[2]||'').trim(); if(rest && !/^(sim|n[ãa]o|sem altera|sem riscos|nenhum|em risco|em aten|on track|no prazo|off track|—|-)$/i.test(rest.replace(/\.$/,''))){ rest.split(/\s+·\s+|;\s+/).forEach(function(x){push(b,x);}); } return; }
      cur=null; return;
    }
    if(/^#{1,6}\s/.test(ln) || /^\d+[.\)]\s/.test(plain) || /^\*\*[^*]+\*\*$/.test(ln)){ cur=cat(plain); return; }
    if(/^[-*•]|^✅|^🔄|^⏳|^\[[ x]\]/.test(ln)){ push(cur||'avancos', ln); return; }
    if(cur){ if(/^[A-Za-zÀ-ÿ0-9"']/.test(plain) && plain.length>18) push(cur, ln); return; }
    // parágrafo-resumo (sem seção): vira o 1º avanço
    if(!gotSummary && /^[A-Za-zÀ-ÿ"']/.test(plain) && plain.length>40){ push('avancos', ln); gotSummary=true; }
  });
  return out;
}
function consolidadoInner(){
  const wks=consolWeeks(); if(!wks.length) return '<div class="empty"><div class="eic">📝</div><div>Sem reportes</div></div>';
  if(CWEEK>=wks.length)CWEEK=0; const W=wks[CWEEK];
  const cur=(typeof CONSOLIDADO!=='undefined')?CONSOLIDADO:null;
  const useCurated=cur&&isoWeekKey(cur.semana)===W.key;
  const lastOf=id=>{const a=(typeof REPORTS!=='undefined'?REPORTS:[]).filter(x=>x.proj===id).sort((x,y)=>y.data.localeCompare(x.data));return a.length?a[0].data:null;};
  const items=DADOS.projetos.map(function(p){ var r=W.reps[p.id];
    if(r){ var sec; if(useCurated){var ci=(cur.itens||[]).find(x=>x.proj===p.id); sec=ci?{avancos:ci.avancos,bloqueios:ci.bloqueios,pendencias:ci.pendencias}:parseReport(r.body);} else sec=parseReport(r.body); return {p:p,r:r,sec:sec,paused:false}; }
    return {p:p,r:null,sec:{avancos:[],bloqueios:[],pendencias:[]},paused:true,last:lastOf(p.id)};});
  let ok=0,risco=0,off=0,totB=0,rep=0;
  items.forEach(function(it){ var h=it.paused?'Off track':it.r.health; if(h==='No prazo')ok++;else if(h==='Em risco')risco++;else off++; if(!it.paused){rep++;totB+=it.sec.bloqueios.length;} });
  const kpi=(l,v,c)=>'<div style="background:#f4f5f7;border:1px solid var(--border);border-radius:.7rem;padding:.55rem .8rem"><div style="font-size:.68rem;color:var(--muted)">'+l+'</div><div style="font-size:1.25rem;font-weight:800;color:'+(c||'var(--navy)')+'">'+v+'</div></div>';
  const li=(arr,color)=>arr.length?'<ul style="margin:.1rem 0 0;padding:0;list-style:none">'+arr.map(x=>'<li style="display:flex;gap:.4rem;align-items:flex-start;margin:.28rem 0;font-size:.79rem;line-height:1.4"><span style="color:'+color+';margin-top:.02rem">●</span><span>'+x+'</span></li>').join('')+'</ul>':'<div style="font-size:.77rem;color:var(--muted);font-style:italic;padding:.2rem 0">—</div>';
  const nav='<div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;flex-wrap:wrap">'
    +'<button onclick="setCWEEK(1)"'+(CWEEK>=wks.length-1?' disabled':'')+' style="border:1px solid var(--border);background:#fff;border-radius:.5rem;padding:.28rem .65rem;cursor:pointer;font-size:.8rem">◀ anterior</button>'
    +'<span style="font-family:Roboto;font-weight:700;font-size:.95rem">Semana de '+weekRange(W.ref)+'</span>'
    +'<button onclick="setCWEEK(-1)"'+(CWEEK<=0?' disabled':'')+' style="border:1px solid var(--border);background:#fff;border-radius:.5rem;padding:.28rem .65rem;cursor:pointer;font-size:.8rem">próxima ▶</button>'
    +'<span style="font-size:.72rem;color:var(--muted)">'+(CWEEK===0?'semana mais recente · ':'')+rep+' de '+items.length+' reportaram · '+(CWEEK+1)+'/'+wks.length+'</span></div>';
  const cards=items.map(function(o){var p=o.p,r=o.r,sec=o.sec,paused=o.paused;
    var okr=p.okr?'<span class="okr">'+p.okr+' · '+okrNome(p.okr)+'</span>':'';
    var health=paused?'Off track':r.health;
    var head='<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.7rem">'
      +'<span class="adot" style="background:'+(AREA_COLORS[p.grupo]||'#888')+'"></span>'
      +'<span onclick="openDealById(\''+p.id+'\')" style="font-family:Roboto;font-weight:700;font-size:.96rem;cursor:pointer;color:var(--blue)" title="Abrir projeto">'+p.nome.split('—')[0].trim()+'</span>'
      +okr+'<span style="font-size:.62rem;background:#eef2ff;color:#475569;padding:.08rem .45rem;border-radius:99px">'+p.grupo+'</span>'
      +'<span class="hbadge '+healthClass(health)+'">'+health+'</span>'
      +'<span style="margin-left:auto;font-size:.7rem;color:var(--muted)">'+(paused?'sem reporte nesta semana':'reporte '+fmt(r.data))+'</span></div>';
    if(paused) return '<div class="card" style="padding:.85rem 1.15rem;margin-bottom:.9rem;opacity:.7">'+head+'<div style="font-size:.8rem;color:var(--muted)">⏸ Sem atualização nesta semana — projeto considerado <b>pausado</b> (Off track).'+(o.last?' Último reporte em '+fmt(o.last)+'.':'')+'</div></div>';
    return '<div class="card" style="padding:1rem 1.15rem;margin-bottom:.9rem">'+head
      +'<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1.1rem">'
      +'<div><div style="font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--green);margin-bottom:.25rem">✓ Avanços</div>'+li(sec.avancos,'var(--green)')+'</div>'
      +'<div><div style="font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--red);margin-bottom:.25rem">⚠ Bloqueios / riscos</div>'+li(sec.bloqueios,'var(--red)')+'</div>'
      +'<div><div style="font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#92400e;margin-bottom:.25rem">→ Pendências / próximos</div>'+li(sec.pendencias,'#92400e')+'</div>'
      +'</div></div>';
  }).join('');
  return nav+'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:.7rem;margin-bottom:1rem">'+kpi('Projetos',items.length,'')+kpi('No prazo',ok,'var(--green)')+kpi('Em risco',risco,'var(--amber)')+kpi('Off / pausado',off,off?'var(--red)':'')+kpi('Bloqueios',totB,totB?'var(--red)':'')+'</div>'+cards;
}

function renderReports(){
  const head='<div class="pghead"><div><h1>Reporte Semanal</h1><div class="st">Consolidado da semana + histórico de Project Updates por projeto (texto fiel ao Linear)</div></div></div>';
  const tabs='<div class="subtabs"><div class="subtab '+(REPTAB==='consol'?'active':'')+'" onclick="setREPTAB(\'consol\')">Consolidado</div><div class="subtab '+(REPTAB==='hist'?'active':'')+'" onclick="setREPTAB(\'hist\')">Por projeto (histórico)</div></div>';
  const consol='<div style="display:'+(REPTAB==='consol'?'block':'none')+'">'+consolidadoInner()+'</div>';
  const hist='<div style="display:'+(REPTAB==='hist'?'block':'none')+'">'+reportsListInner()+'</div>';
  document.getElementById('view-reports').innerHTML=head+tabs+consol+hist;
}

function go(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active', a.dataset.v===v));
  window.scrollTo(0,0);
}
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>go(a.dataset.v)));

renderDashboard(); renderOKR(); renderExec(); renderProjetos(); renderRaid(); renderReports();
</script>
