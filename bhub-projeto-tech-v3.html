06: Construção Motor Contábil 26% → 38% · target 31/07 → 31/08*"}, {"proj": "motor-fiscal-sn", "projNome": "Motor Fiscal SN", "data": "2026-06-19", "autor": "Andressa", "health": "Em risco", "body": "**MOTOR FISCAL SN — Project Update**\n**Título do Update:** Semana de 19/06/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso (O que avançou?)**\n* **Arquitetura do workflow validada com Jorge — sem mais impedimentos:** documentação completa da arquitetura do workflow ApuracaoFiscal alinhada e validada. Decisões de escopo com Produto (remoção da detecção de anomalia de insumos pré-DAS, simplificando o fluxo).\n* **BHules consolidado como fonte da verdade para insumos de notas:** Jorge migrou todos os insumos de notas para o BHules.\n* **Tarefas dos próximos cycles planejadas no Linear:** backlog do Motor de Cálculo SN estruturado (FIS-329, FIS-330, FIS-331, FIS-372, FIS-373, FIS-276, FIS-259).\n* **Motor de Classificação SN (BHules) evoluindo:** bugs críticos resolvidos (FIS-336, FIS-338 concluídos); features concluídas (FIS-307, FIS-313). Em andamento: FIS-340, FIS-326, FIS-323, FIS-328, FIS-341.\n* **Fluxo de consumo de notas validado (FIS-191 — concluído).**\n* **Reorganização e limpeza do Linear:** duplicadas canceladas/arquivadas (FIS-277, FIS-278, FIS-280); epics-mãe FIS-299 a FIS-303 mantidas.\n\n**2. Gestão de Riscos (Por que está em risco?)**\n* **Causa:** Motor de Classificação SN ainda apresenta inconsistências em produção — CST incorreto SN, CFOP interestadual errado, CFOP 5929 automático indevido, instabilidade nos filtros. Volume de ajustes para first-time-right >= 95% é relevante.\n* **Impacto:** meta de cobertura 100% (1.534) e KPI first-time-right >= 95% em risco enquanto bugs não resolvidos e motor reprocessado. Construção do Motor de Cálculo depende da estabilidade da classificação.\n\n**3. Indicador Chave de Desempenho (KPI)**\n* **Primário:** First-time-right na classificação fiscal (BHules).\n* **Status:** ~52% de progresso no milestone Motor de Classificação SN (meta >= 95%).\n* **Tendência:** em evolução, ainda abaixo da meta.\n\n**4. Próximos Passos**\n* Jorge concluir correções do BHules (FIS-340, FIS-337, FIS-339, FIS-327) e reprocessar (FIS-342).\n* Refinamento técnico das issues do Motor de Cálculo SN (FIS-329, FIS-330, FIS-331).\n* Decisão sobre continuidade do robô de ECD (FIS-347).\n* Iniciar tarefas do Cycle 04.\n\n**5. Bloqueios externos**\n* Sem bloqueios externos que exijam intervenção da Diretoria/CPO nesta semana. Riscos internos (qualidade do motor) tratados pelo time.\n\n*Progresso desde 12/06: Classificação SN 60% → 52% · Cálculo SN 12% → 24%*"}, {"proj": "motor-fiscal-sn", "projNome": "Motor Fiscal SN", "data": "2026-06-12", "autor": "Andressa", "health": "Em risco", "body": "**Update de Projeto — Motor Fiscal SN · escala 100% da base**\n**Período: Semana · Data: 12/06/2026 · Lead: Jeisy Sousa · Time: Fiscal + Cockpit + Hub · Objetivo: O4 · Wave: SN (Onda 1)**\n\n**Status geral:** 🟡 Em risco\n\nO Cycle 3 inicia com avanço expressivo na estabilização do Motor de Classificação: o gate de revisão humana para Lucro Real e o discovery da árvore de regras de classificação foram concluídos nesta semana. O Motor de Cálculo (DAS) entrou em construção com discovery de arquitetura iniciado. O milestone de 31/07 segue em risco dado o volume de correções pendentes — mas o ritmo desta semana é positivo.\n\n**Marcos**\n| Marco | Status | Previsão |\n| -- | -- | -- |\n| M1 · Construção · Motor de Classificação SN | Em andamento | 31/07/2026 |\n| M2 · Construção · Motor de Cálculo SN | Em andamento | 31/07/2026 |\n| M3 · Cobertura 100% · Classificação de notas | Em andamento | 31/07/2026 |\n| M4 · Cobertura 100% · Cálculo DAS | A iniciar | 31/08/2026 |\n\n**Entregue no período:** gate de revisão humana obrigatória p/ Lucro Real (FIS-313) · árvore de decisão de classificação formalizada (FIS-314) · discovery do fluxo DAS iniciado (FIS-258) · dependências Cockpit e Hub formalizadas (COCKPIT-521, HUB-234) · escopo de construção mapeado em 7+5 entregas.\n\n**Riscos:** volume de bugs de classificação pode comprimir a janela do Motor de Cálculo (mitigação: árvore de regras estrutura as correções) · alta concentração de entregas em Jorge Rodrigues.\n\n**Decisão necessária:** ferramenta de captura de notas — Jettax ou Unecont (Jeni + Jorge, prazo 20/06; comparativo FIS-124).\n\n*Progresso desde 02/06: Cálculo SN 0% → 12%*"}, {"proj": "motor-fiscal-sn", "projNome": "Motor Fiscal SN", "data": "2026-06-02", "autor": "Jeniffer", "health": "Em risco", "body": "**Título do Update:** Semana de 02/06/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso**\nSemana dominada pela resposta ao incidente de classificação automática do motor (detectado 28/05, contido no mesmo dia). Entre 21/04 e 28/05 o motor escriturou automaticamente notas com classificação incorreta no Domínio/Onvio — 16.031 notas no universo de risco, 559 clientes, 111 com erro confirmável. Causa raiz: loop de autorreforço do precedente, finalidade inferida do emitente, lacunas de dados tributários (ST e PIS/COFINS).\nResposta: 28/05 congelamento na origem · 29–31/05 correção da causa raiz · 01/06 cutover (maio bypassa o motor, revisão humana obrigatória) · 01–02/06 reenvio de 32.125 notas de maio · junho ativo com 0 escrituração automática.\nAvanços paralelos: FIS-121 concluída · FIS-247 e FIS-248 criadas (Jeisy) · FIS-238 em andamento · FIS-245/FIS-246 (protótipos) · RPA emissão ISS SP anunciado.\n\n**2. Gestão de Riscos**\nCenário pós-incidente em estabilização. 4 pontos: (a) reincidência silenciosa — monitoramento proativo de qualidade ainda aberto · (b) volumetria de revisão sobrecarregando operação · (c) dependência crítica do Jorge · (d) bugs operacionais (FIS-92/93/94/95/100); métricas BHules não confiáveis (FIS-101).\n\n**3. KPI**\nKR4.1 — Cobertura BHules SN. Onda 1 (423) + Onda 2 (2.150) implantadas. Junho com motor corrigido + revisão humana. 0 escrituração automática confirmada.\n\n**4. Próximos Passos**\nMonitoramento proativo de qualidade · generalização do cross-check legal × precedente · exclusão das 145 empresas de exceção · FIS-247/FIS-248 · concluir FIS-191 (destrava FIS-189) · relatórios SN (FIS-238/239/240) · bugs FIS-92/93/94/95/100.\n\n**5. Bloqueios/Dependências**\n🔴 Prioridade: estabilizar o motor em junho com revisão humana antes de qualquer expansão. Dependências: time tech (Jorge+Eng) · AWS/time Dan · Papa/infra · Hub Experiência."}, {"proj": "motor-fiscal-sn", "projNome": "Motor Fiscal SN", "data": "2026-05-29", "autor": "Jeniffer", "health": "Em risco", "body": "**Título do Update:** Semana de 28/05/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso**\nSemana de validação intensa com a operação. Mutirão pós-Onda 1 (Sônia, Aline, Karen, JP) em 28/05 — ferramenta avaliada 5/5 em usabilidade. Em 22/05 Jorge subiu regras novas; a partir de 25/05 a operação observou melhora clara na classificação automática.\nConcluídas: FIS-88 (De/Para CFOPs), FIS-89 (exceções), FIS-91 (Onda 2 — 2.150 empresas), FIS-122 (balde — Glauco). FIS-149 (Discovery Jornada Fiscal SN) em andamento. Luiz Felipe abriu FIS-238/239/240 (relatórios).\nFluxo DAS (FIS-189): motor testado em 3 de 5 casos; 2 falharam por falta de insumos.\n\n**2. Gestão de Riscos**\n⚠️ Escalada formal para a diretoria em 28/05 após o mutirão expor falhas estruturais. (a) qualidade 3-4/5 vs 5/5 usabilidade · (b) bugs estruturais (CFOP em massa, precedente anulando regras legais, SPED contaminando entre empresas, NCM, ramo de atividade ignorado, PIS/COFINS monofásicos) · (c) bugs FIS-92/93/94/95/100 (Jorge) · (d) métricas não confiáveis (FIS-101).\n\n**3. KPI**\nKR4.1 — Cobertura BHules SN. Onda 1 (423) + Onda 2 (2.150). Qualidade ainda não validada para escalar.\n\n**4. Próximos Passos**\nRepriorizar roadmap de correções · limpeza do painel Domínio · reindexação Jettax→Domínio · status \"pendente operação\" + Excel · repuxar histórico SPED por empresa · concluir FIS-191 · avançar FIS-149.\n\n**5. Bloqueios/Dependências**\n🔴 Corrigir os erros estruturais do mutirão antes de qualquer novo rollout. Dependências: tech (Jorge+Eng) · Papa/infra · Hub Experiência."}, {"proj": "motor-fiscal-sn", "projNome": "Motor Fiscal SN", "data": "2026-05-22", "autor": "Jeniffer", "health": "No prazo", "body": "**Título do Update:** Semana de 21/05/2026\n**Saúde do Projeto:** 🟢 On track\n\n**1. Evolução e Progresso**\nA Onda 2 (2.150 empresas SN) saiu da implantação e entrou em validação. O discovery de buscadores (Jettax × Unecont × Agrocontar) avançou: não é viável migrar para Jettax agora (cobertura inferior à Unecont — Lobby: Jettax 29 × Unecont 99 NFS). Decisão de migrar SIEG → Jettax para padronizar. Jorge rodou ajustes em CFOP × CST/CSOSN e limpeza de notas. Criadas FIS-189 (validar fluxo DAS) e FIS-191 (validar consumo de notas — bloqueia FIS-189).\n\n**2. Gestão de Riscos**\nOn track, 4 pontos em monitoramento: (a) volume alto de notas em revisão pós-Onda 2 (2.635 em 21/05) · (b) classificação inconsistente entre meses (ASPR) · (c) rotina de importação travou no fim de abril · (d) bugs FIS-92/93/94/95/100.\n\n**3. KPI**\nKR4.1 — Cobertura BHules SN. Onda 1 (423) + Onda 2 (2.150). Subindo em cobertura.\n\n**4. Próximos Passos**\nAgenda operacional + Mutirão (28/05) · acompanhar apuração de maio (Carnavale) · concluir FIS-191 · interface temporária do balde no Cockpit · comparativo Unecont × Jettax × Agrocontar · bugs do BHules.\n\n**5. Bloqueios/Dependências**\nDependência Papa/infra (rotina de importação) · Hub Experiência (cobrança de documentos / balde)."}, {"proj": "motor-fiscal-sn", "projNome": "Motor Fiscal SN", "data": "2026-05-15", "autor": "Jeniffer", "health": "No prazo", "body": "**Título do Update:** Semana de 15/05/2026\n**Saúde do Projeto:** 🟢 On track\n\n**1. Evolução e Progresso**\nMarco da Onda 2 do BHules: implantação de 2.150 novas empresas ativas no motor, elevando a cobertura sobre a base SN e mantendo a Onda 1 (423) estável. Discovery de captura comparando Jettax e Unecont; próxima semana testes com Agrocontar para fechar a recomendação do buscador padrão. Bugs operacionais endereçados; tabela De/Para de CFOPs e planilha de exceções em construção.\n\n**2. Gestão de Riscos**\nOn track. Atenção (sem alterar health): confiabilidade das métricas do BHules (não batem com a fonte bruta), baixa de SPED 100% manual, e bugs operacionais (notas voltando para \"Requer Revisão\", CFOP inexistente, auditoria com horário inconsistente, oscilações do motor).\n\n**3. KPI**\nKR4.1 — Cobertura BHules SN. Onda 2 (+2.150) sobre Onda 1 (423) → avanço material rumo a 1.534/1.534. Número exato depende do fechamento na fonte bruta (Databricks).\n\n**4. Próximos Passos**\nTestes com Agrocontar e fechar recomendação · monitorar estabilização da Onda 2 · resolver 4 bugs operacionais + divergência de 241 notas Jettax × BHules · finalizar De/Para CFOPs e exceções · métricas com fonte única (Databricks) · automação da baixa de SPED.\n\n**5. Bloqueios externos**\nNenhum que exija Diretoria/CPO. Atenção: dependência do tech para automatizar a baixa de SPED (hoje 100% manual)."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-06-19", "autor": "Andressa", "health": "No prazo", "body": "**RPA FISCAL — Project Update**\n**Título do Update:** Semana de 19/06/2026\n**Saúde do Projeto:** 🟢 On track\n\n**1. Evolução e Progresso**\n* **Módulo único de consulta Nacional em revisão (FIS-275):** cobertura validada para SBC, Curitiba, RJ, Niterói, Goiânia, Brasília, Vitória, Florianópolis, Manaus e Porto Alegre.\n* **Escrituração SBC via Nacional concluída (FIS-272).**\n* **Painel RPA de controle interno em revisão (FIS-188):** infra de dashboard (FIS-232) pendente de provisionar.\n* **BRD do Motor de Trigger de Escrituração NFS-e concluído (FIS-283):** base para a integração BHules → RPA priorizada para o Cycle 04.\n* **Backlog de rollout estruturado:** issues por município (SP, RJ, Fortaleza, SBC, Campinas) — testes/validação (E1) e rollout gradual (E2), + epics E3, E4, E5.\n* **Epics em andamento:** FIS-284 (Marcelo), FIS-285 (Danilo), FIS-286 e FIS-287 (Guilherme Porto), FIS-288 (Marcelo).\n\n**2. Gestão de Riscos**\nOn track. Frentes avançando dentro do cycle. Repriorizar BHules → RPA para o Cycle 04 reduz risco. Municípios foco Q2 (SP, RJ, Fortaleza, SBC, Campinas) via portais próprios, sem dependência do Nacional. Sem desvios críticos.\n\n**3. KPI**\n* **Primário:** First-time-right na escrituração de NFS-e tomados por município (meta >= 95%).\n* **Status:** milestone \"Construção de RPAs\" com ~80%. SP, Fortaleza e Campinas com RPAs entregues aguardando validação/rollout; SBC via Nacional.\n\n**4. Próximos Passos**\nMarcelo concluir revisão do módulo Nacional (FIS-275) e testes por município (FIS-351) · Danilo finalizar Guia ISS SP (FIS-285) · Guilherme Porto provisionar infra (FIS-232) e concluir painel (FIS-188).\n\n**5. Bloqueios externos**\nMunicípios com certificado/spec de API privada (ex.: Campinas — ABRASF) seguem com workaround via RPA/upload, já em produção. Sem bloqueios que exijam Diretoria/CPO.\n\n*Progresso desde 12/06: Construção de RPAs 75% → 80%*"}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-06-12", "autor": "Andressa", "health": "No prazo", "body": "**Update de Projeto — RPA Fiscal · ponte de automação via bots**\n**Período: Semana · Data: 12/06/2026 · Lead: Jeisy Sousa · Time: Fiscal · Objetivo: O4 · Wave: SN**\n\n**Status geral:** 🟢 No prazo\n\nSemana de alto volume de entregas. A escrituração de NFS-e tomados deu um salto: abordagem via Lambda (scraping HTTP no lugar de VM Windows) validada e implementada para SP e RJ, tornando a escrituração escalável. Cobertura via NFS-e Nacional expandida para SBC, Curitiba, Niterói e demais. RPA ISS SP validado em produção e migrando para Lambda com trigger por eventos. Painel de controle interno avançou para revisão final.\n\n**Marco:** M1 · Construção · RPAs Escrituração e guias entregue — 31/07/2026 · Confiança 🟢 Alta.\n\n**Entregue:** escrituração SP e RJ via Lambda (scraping) ✓ · cobertura NFS-e Nacional (SBC, Curitiba, Niterói + 7 municípios) ✓ · Campinas em produção ✓ · lançamento nota a nota ✓ · RPA ISS SP validado em produção (02/06) ✓ · documentação rollout ISS SP e BRD AWS ✓ · painel em revisão final.\n\nEm andamento: FIS-269 (ISS SP→Lambda), FIS-267 (triagem), FIS-268 (fallback Slack), FIS-275 (módulo Nacional), FIS-271 (deploy AWS), FIS-188 (painel). Aguardando: FIS-260 (BHules→RPA), FIS-282 (Motor Fiscal→RPA ISS SP), FIS-232 (infra painel).\n\n**Bloqueios:** nenhum ativo. **Risco:** município Nacional com XSD privado (mitigação: RPA portal validado como fallback).\n\n*Progresso desde 03/06: Construção de RPAs 0% → 75%*"}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-06-03", "autor": "Andressa", "health": "No prazo", "body": "**Semana 03/06/2026 · 🟢 On track — RPA FISCAL**\n\n**1. Evolução e Progresso**\nSemana marcada pelo go live da automação de emissão de guias ISS São Paulo — principal entrega do Cycle 2. O robô processou o 1º de 3 grupos da base elegível na noite de 02/06, com mais de 100 empresas processadas em produção com insumos reais pela primeira vez. Painel interno avançou com backend integrado ao Bhubot. Bots SPED Agrocontar operacionais na nova estrutura, com monitoramento ativo. Fortaleza em produção para escrituração de NFS tomados.\n\n**2. Gestão de Riscos — Em atenção**\nGo live do ISS SP revelou dois pontos antes do próximo processamento: templates de entrega no Gestta Express ainda não funcionam (guias geradas mas não entregues ao cliente); 3 empresas com ponta invalidada (SOAP com código não tratado). Ambos mapeados e em tratamento.\n\n**3. KPI — Melhorou**\nPrimeiro processamento massivo em produção — +100 empresas no ISS SP, taxa de sucesso elevada (3 casos com observação).\n\n**4. Próximos Passos**\nResolver template do Gestta Express (bloqueador crítico) · investigar 3 casos invalidados · frontend do painel · decisão sobre guias já emitidas · iniciar Campinas.\n\n**5. Bloqueios/Dependências**\nApoio externo necessário? Não. Template Gestta Express em resolução (Jeniffer e JP apoiando)."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-05-29", "autor": "Andressa", "health": "No prazo", "body": "**Semana 29/05/2026 · 🟢 On track — RPA FISCAL**\n\n**1. Evolução e Progresso**\nSemana de alta produtividade. Migração dos bots SPED Agrocontar para o novo framework concluída (todos os 31 bots implantados e operacionais). Escrituração NFS tomados: Fortaleza entregue para testes; Campinas em desenvolvimento. Painel interno de controle dos RPAs (Fiscal + DP) em desenvolvimento ativo, com parte do backend entregue. Validação da emissão do ISS SP em produção com insumos reais em andamento.\n\n**2. Gestão de Riscos — Sem riscos relevantes**\nOn track. A decisão de priorizar arquitetura escalável antes de finalizar Campinas e SBC é estratégica — garante expansão sustentável para 1.100+ clientes SN.\n\n**3. KPI — Sem alteração**\nBaseline de cobertura e redução de intervenção manual a ser estabelecido após estabilização dos bots e entrega do painel.\n\n**4. Próximos Passos**\nEstrutura escalável de escrituração de NFS tomados · concluir migração Agrocontar para VMs + monitoramento · avançar painel (backend+frontend) · ISS SP em produção com insumos reais.\n\n**5. Bloqueios:** Sem bloqueios externos no momento."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-05-22", "autor": "Andressa", "health": "No prazo", "body": "**Semana 22/05/2026 · 🟢 On track — RPA Fiscal**\n\n**1. Evolução e Progresso**\nAlta produtividade em duas frentes. Escrituração de NFS tomados: SP e RJ concluídas no Cycle 1, Campinas em finalização. Bots SPED Agrocontar: migração para o novo framework acelerada — +15 clientes implantados na semana. RPA de emissão de guias ISS SP pronto para validação em produção na 1ª semana de junho.\n\n**Entregas:** escrituração NFS tomados SP ✓ e RJ ✓ em produção · novo padrão de framework em todos os grupos de bots SPED ✓ · +15 clientes Agrocontar migrados ✓ · RPA ISS SP documentado e pronto para rollout em junho.\n\n**2. Gestão de Riscos — Sem riscos relevantes.** Entregas do Cycle 1 dentro do prazo.\n\n**3. KPI — Sem alteração.** Baseline de cobertura no prazo e redução de HITL ainda não estabelecidos.\n\n**4. Próximos Passos**\nConcluir migração dos bots Agrocontar restantes · finalizar top 5 prefeituras (Campinas, Fortaleza) · iniciar Cycle 2 com foco em escalabilidade (1.100+ clientes SN) · MVP do painel interno de monitoramento.\n\n**5. Bloqueios:** Sem bloqueios externos."}, {"proj": "rpa-fiscal", "projNome": "RPA Fiscal", "data": "2026-05-14", "autor": "Jeisy Sousa", "health": "No prazo", "body": "**Título do Update:** Semana de 14/05/2026\n**Saúde do Projeto:** 🟢 On track\n\n**Evolução e Progresso**\n* Desenvolvimento e refatoração dos bots SPED clientes Agrocontar em andamento — FIS-54 com 10 de 16 subtarefas concluídas (62,5%).\n* Discovery de Escrituração de NFS Tomados (FIS-2): priorizar top 5 prefeituras (>50% da base); time tech já trabalhando na integração/RPA dessas prefeituras.\n\n**Gestão de Riscos:** On track. Atenção aos guardrails: risco de 2FA em certificado quebrando ~20% dos bots (handoff humano) e mudanças em layouts de prefeituras — exigem monitoramento contínuo.\n\n**KPI:** % de obrigações RPA no prazo / Redução de HITL por bot. Sem baseline (meta >= 95% no prazo; HITL -60%). Projeto iniciou 01/05/2026.\n\n**Próximos Passos**\nConcluir as 6 subtarefas restantes de FIS-54 e avançar para implantação gradual (FIS-68) · acompanhar time tech na escrituração de NFS tomados (FIS-2) e quebra por prefeitura.\n\n**Bloqueios externos:** Nenhum nesta semana. Milestone \"Versão interna pronta\" previsto para 15/jul — atenção ao ritmo."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-06-19", "autor": "Andressa", "health": "Em risco", "body": "**MOTOR TRABALHISTA / DP — Project Update**\n**Título do Update:** Semana de 19/06/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso**\n* **Motor eSocial fluindo para entrega no Cycle 03** — DP-101 (envio da folha ao eSocial) em andamento com Matheus. Infra S-1200/S-1299 em construção.\n* **Validação de relatórios desbloqueada** — DP-100 (Resumo de Folha e Holerites, 10 empresas) em andamento com Reginaldo.\n* **Extrato Mensal em desenvolvimento** — DP-133 criada e em andamento; validação aguarda atualização da base dev.\n* **Plano B do Consignado em construção** — diante do bloqueio DataPrev, Sávio estrutura importação manual; DP-91 em andamento.\n* **Reestruturação de escopo e epics** — DP-135 criado como E7 (orquestração Restate + entrega final); DP-134, DP-137, DP-136 formalizadas.\n* **Cálculo de folha (DP-3) em revisão.**\n* **Alinhamento com Hub sobre Experiência DP concluído** (HUB-235, COCKPIT-523).\n\n**2. Gestão de Riscos**\n* **Risco 1:** base de DEV sem dados de produção (depende de Dan e Felipe) → validação do Extrato Mensal (DP-133) e DP-100 travadas no Cycle 03.\n* **Risco 2:** acesso à DataPrev não obtido → consignado (DP-58 + DP-93) não entregue integralmente via API; Plano B (importação manual) mitiga para produção.\n\n**3. KPI**\n* **Primário:** Empresas SN com folha fechada automaticamente. **Status:** 0/10 empresas (meta: 10 até fim do Cycle 03).\n\n**4. Próximos Passos**\nAtualização da base dev (Dan/Felipe) · conclusão do motor eSocial (DP-101) · Reginaldo avançar Extrato Mensal (DP-133) · Sávio finalizar Plano B do consignado (DP-91 + DP-93) · alinhamentos técnicos com Hub e Cockpit.\n\n**5. Bloqueios externos**\n* **[BLOQUEIO — requer CPO/Diretoria] Base de DEV com dados de produção** (Dan e Felipe) — sem isso DP-133 e DP-100 não fecham no Cycle 03.\n* **[BLOQUEIO EXTERNO] Acesso à DataPrev (Consignado)** — credenciais/acesso à API ainda não obtidos.\n\n*Progresso desde 12/06: Folha s/ apontamento 22% → 18%*"}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-06-12", "autor": "Jeniffer", "health": "Em risco", "body": "**Update de Projeto — Motor Trabalhista · folha + obrigações DP**\n**Período: Semana · Data: 12/06/2026 · Lead: Jeniffer Dauricio · Time: DP + Cockpit + Hub · Objetivo: O4 · Wave: SN**\n\n**Status geral:** 🟡 Em risco\n\nCycle 3 inicia com o motor de cálculo de pró-labore construído e dois desbloqueadores recentes — API do Cockpit liberada e FGTS Digital validado em produção. Mas surgiram dois bloqueios: base de DEV desatualizada/insuficiente para as 10 empresas piloto, e empréstimo consignado impedido até retorno da DataPrev.\n\n**Marco atual:** M1 · Construção · Empresas Pró-Labore SN — 68% conforme Linear · 31/07/2026 · Confiança 🟡 Média.\n\n**Entregue:** FGTS Digital em produção (DP-57) · cálculo de folha e pró-labore Parte 2 com API Cockpit desbloqueada (DP-56) · discovery jornada DP (DP-9) · dependências Cockpit/Hub formalizadas (COCKPIT-523, HUB-235) · decisão: regras de negócio das jornadas ficam no Motor DP.\n\n**Bloqueios:** (1) base de DEV insuficiente — depende de Jorge + Dan, prazo 16/06; (2) habilitação da API DataPrev (consignado, DP-58/DP-93) — aguardando retorno externo.\n\n**Riscos:** acesso à base de Prod não resolvido até 16/06 atrasa validação · DataPrev não retornar no Cycle 3 · integração Hub ↔ Motor DP com múltiplas dependências em triage.\n\n*Progresso desde 02/06: Pró-Labore 0% → 68% · Folha s/ apontamento 0% → 22%*"}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-06-02", "autor": "Andressa", "health": "Em risco", "body": "**Semana 03/06/2026 · 🟡 At risk — MOTOR TRABALHISTA**\n\n**1. Evolução e Progresso**\nSemana de alta entrega em duas frentes. Motor de cálculo: pró-labore e RAT/FAP adicionados ao cálculo de folha; primeiro relatório (holerite) em revisão final; relatório de líquidos concluído. Regras e discovery: documentos técnicos de admissão, rescisão, férias e RPA em P) e primeiros relatórios · tabelas eSocial · migração do RPA de admissão para API.\n\n**5. Bloqueios:** Sim — decisão arquitetural DP × Hub (impacta os dois times)."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-05-22", "autor": "Andressa", "health": "No prazo", "body": "**Semana 22/05/2026 · 🟢 On track — Motor Trabalhista**\n\n**1. Evolução e Progresso**\nAvanço em duas frentes. Produto: mapeamento das regras das três jornadas mais críticas — admissão, rescisão e férias — concluído, garantindo validações corretas desde o início. Tech: motor de cálculo de folha próprio em finalização em dev. RPA de emissão de guias FGTS com solução pronta para validação em produção.\n\n**Entregas:** regras de admissão, rescisão e férias documentadas e validadas · specs visuais dos relatórios (holerite, resumo de folha, líquidos) em definição com padrão BHub · motor de cálculo de folha em finalização.\n\n**2. Gestão de Riscos — Sem riscos relevantes.** On track.\n\n**3. KPI — Sem alteração.** Baseline no piloto (julho).\n\n**4. Próximos Passos**\nValidar FGTS em produção · evoluir motor (pró-labore, encargos SN) · relatórios no padrão BHub · iniciar integração com eSocial.\n\n**5. Bloqueios:** Sim — decisão arquitetural em aberto (com Henrique e Jorge): onde residem as regras das jornadas (Motor DP ou Hub)."}, {"proj": "motor-trabalhista", "projNome": "Motor Trabalhista (DP)", "data": "2026-05-15", "autor": "Andressa", "health": "No prazo", "body": "**Semana de 15/05/2026 · 🟢 On track**\n\n**1. Evolução e Progresso**\n* DP-3 iniciada (Cálculo de folha + pró-labore): Eng (Sávio + Reginaldo) iniciou a implementação do cálculo de folha CLT e pró-labore para SN sem apontamentos. Repo bhub-general-ledger em setup.\n* DP-1 iniciada (Geração de relatórios): Eng (Glauco + Mateus) validando endpoints da PoC e levantando campos de Resumo de Folha e Relação de Líquidos.\n* Documentação das issues concluída (contexto + regras de negócio + requisitos).\n* Discovery de jornadas macro iniciado (admissão, rescisão, apontamentos, férias) com foco em dependências com o Hub.\n\n**2. Gestão de Riscos:** On track. Sem desvios.\n\n**3. KPI:** Cobertura Hub DP folha E2E. 0% (motor em implementação). Meta 65% até 15/jul, 100% até 31/jul.\n\n**4. Próximos Passos**\nDP-3: implementar INSS, IRRF, FGTS, RAT×FAP; validar contra 10 folhas reais · DP-1: estrutura do payload e geração de PDF · Infra: ambiente dev com CI/CD (Glauco) · agendar discovery de jornadas com PM do Hub.\n\n**5. Bloqueios externos:** Nenhum que exija Diretoria/CPO. Dependência a observar: jornadas (admissão/rescisão/apontamentos/férias) dependem do Hub — alinhamento com o PM do Hub nas próximas semanas."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-06-19", "autor": "Andressa", "health": "Em risco", "body": "**MOTOR CONTÁBIL — Project Update**\n**Título do Update:** Semana de 19/06/2026\n**Saúde do Projeto:** 🟡 At risk\n\n**1. Evolução e Progresso**\n* **Backlog de Q2 totalmente quebrado e estruturado no Linear** — epics E1 a E8 do milestone \"Construção | Motor Contábil Entregue\" (CTB-69, CTB-70, CTB-71, CTB-72, CTB-23, CTB-74, CTB-80, CTB-84, CTB-83, CTB-93 a CTB-96, CTB-87). Aguardam validação de Fernando e Jorge sobre sequência/priorização.\n* **Bloqueio de acesso ao Git do Paulo Daniel resolvido** — time liberado para execução técnica.\n* **Discovery da jornada Motor Contábil concluído (CTB-1)** — Readiness Check (CTB-15), mapa de eventos × lançamentos D/C (CTB-10), decisão extrato vs. caixa (CTB-13), dependências externas (CTB-12). E1 em andamento.\n* **Spike do Ledger Midaz concluído (CTB-3).**\n* **Spec dos relatórios contábeis criada (CTB-92)** — Razão, Balancete, Balanço, DRE.\n* **Alinhamento com Hub concluído (HUB-238).**\n\n**2. Gestão de Riscos**\n* **Causa:** motor ainda em discovery/planejamento — nenhuma feature técnica em desenvolvimento efetivo. Validação do backlog com Fernando e Jorge é o próximo gate.\n* **Impacto:** divergência de priorização/escopo pode atrasar o início do dev no próximo cycle, comprimindo o piloto (10 clientes Itaú) em Q2.\n\n**3. KPI**\n* **Primário:** Fechamentos contábeis ponta a ponta automatizados (piloto 10 clientes Itaú). **Status:** 0/10.\n\n**4. Próximos Passos**\nValidação do backlog com Fernando e Jorge · Fernando avançar decisões de arquitetura (CTB-68) e fechar E1 · Elaine iniciar spec dos relatórios (CTB-92) · alinhamentos das dependências do Hub (HUB-238).\n\n**5. Bloqueios externos**\nNão há bloqueios externos que exijam Diretoria nesta semana. (Internos em tratativa: decisões D1–D5 e Ledger Midaz na AWS.)\n\n*Progresso desde 12/06: Construção Motor Contábil 7% → 26%*"}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-06-12", "autor": "Andressa", "health": "Em risco", "body": "**Update de Projeto — Motor Contábil · fechamento + conciliação**\n**Período: Semana · Data: 12/06/2026 · Lead: Andressa Rodrigues · Time: Contábil + Cockpit + Hub · Objetivo: O4 · Wave: SN → LP**\n\n**Status geral:** 🟡 Em risco\n\nDiscovery concluído com jornada TO-BE validada e escopo de construção quebrado em 8 entregas. O desenvolvimento ainda não iniciou — Cycle 3 começou nesta semana — com alto volume de decisões técnicas arquiteturais (D1–D5) que bloqueiam o início de várias entregas.\n\n**Marco:** M1 · Construção · Motor Contábil Entregue — 31/07/2026 · Confiança 🔴 Baixa.\nIssues concluídas: 4 (TO-BE validado, Plano de contas mínimo SN, Sustentação Hidra, Mapa de eventos D/C). Em andamento: 3 (Estudo Midaz/Matcher, Discovery CTB-1, Readiness Check). Pendentes/bloqueadas: ~30 (aguardando D1–D5 e Ledger no ar).\n\n**Bloqueios:** (1) decisões D1–D5 (Jorge + Fernando + comitê, prazo 20/06) — bloqueia E2–E8; (2) setup do Ledger Midaz na AWS (Paulo Dias, CTB-4) — atraso por falta de acessos/onboarding.\n\n**Riscos:** D1–D5 atrasar além de 20/06 · milestone 31/07 inatingível com 8 entregas sem início (mitigação: reduzir piloto a MVP Itaú) · alta dependência do Jorge.\n\n**Decisões necessárias:** D1 fusão vs. separação dos motores de classificação · D2 onde mora o plano de contas · D3 onde mora o histórico · D4 papel da IA · D5 multi-tenant Midaz (prazo 20/06).\n\n*Progresso desde 02/06: Construção Motor Contábil 0% → 7%*"}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-06-02", "autor": "Andressa", "health": "Em risco", "body": "**Semana 03/06/2026 · 🟡 At risk — MOTOR CONTÁBIL**\n\n**1. Evolução e Progresso**\nSemana de avanço expressivo no discovery. Mapeamento AS-IS do processo contábil concluído e grande avanço no TO-BE. Plano de contas mínimo SN validado e entregue. Mapa de eventos e lançamentos D/C (interface entre Motor Contábil, DP e Fiscal) concluído. Estudo técnico do Ledger Midaz e Matcher (Lerian) em andamento. Readiness Check iniciado. Novas frentes refinadas para o próximo cycle (De/Para de plano de contas, onboarding contábil).\n\n**2. Gestão de Riscos — Em risco**\nO estudo técnico revelou volume significativo de dúvidas do time de engenharia sobre as ferramentas e o projeto — impedindo o início de qualquer desenvolvimento. Em 02/06 alinhado com Jorge para nivelar o time com documento de esquemas e fluxos. Escopo grande, dev só inicia no Cycle 3, alta dependência do Jorge nas primeiras semanas.\n\n**3. KPI — Sem alteração.** Discovery; baseline a partir da versão interna SN em julho.\n\n**4. Próximos Passos**\nJorge entregar documento de nivelamento (Ledger Midaz/Matcher) · concluir decisão fluxo com/sem extrato, Readiness Check e TO-BE · formalizar dependências com DP, Fiscal e Open Banking.\n\n**5. Bloqueios:** Não — necessidade de apoio já alinhada; soluções encaminhadas."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-05-29", "autor": "Andressa", "health": "No prazo", "body": "**Semana 29/05/2026 · 🟢 On track — MOTOR CONTÁBIL**\n\n**1. Evolução e Progresso**\nDiscovery avançou de forma consistente. Plano de contas mínimo SN concluído e validado com a especialista contábil. Desenho do TO-BE da jornada contábil SN iniciado, assim como o AS-IS do processo atual. Mapa de eventos e lançamentos D/C (interface entre Motor Contábil, DP e Fiscal) iniciado. Decisão sobre fluxo com extrato vs. fechamento via caixa em andamento. Engenharia iniciou o estudo técnico do Ledger Midaz e Matcher; primeiras tasks do Cycle 3 começaram a ser quebradas.\n\n**2. Gestão de Riscos — Sem riscos.** Em andamento conforme planejamento.\n\n**3. KPI — Sem alteração.** Discovery; baseline a partir da versão interna SN em julho.\n\n**4. Próximos Passos**\nConcluir AS-IS, TO-BE, mapa de eventos D/C e decisão com/sem extrato · finalizar estudo técnico Ledger Midaz/Matcher · refinar tasks do Cycle 3 · discovery do reprocessamento retroativo.\n\n**5. Bloqueios:** Não. Dependências com DP e Fiscal (mapa de eventos D/C) mapeadas internamente."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-05-22", "autor": "Andressa", "health": "No prazo", "body": "**Semana 22/05/2026 · 🟢 On track — Motor Contábil (Discovery Q2 · LP Q3)**\n\n**1. Evolução e Progresso**\nDiscovery iniciado com foco no SN. Jornada completa sendo estruturada — AS-IS (Domínio, Conciliador, Hydra) e TO-BE (Ledger Midaz + Matcher da Lerian). Frentes do Cycle 2 refinadas e distribuídas: AS-IS, TO-BE, mapa de eventos contábeis, plano de contas mínimo e dependências externas.\n\n**Entregas:** escopo do discovery estruturado e refinado para o Cycle 2, com responsáveis definidos. Nenhuma entrega finalizada ainda.\n\n**2. Gestão de Riscos — Sem riscos relevantes.** Discovery conforme planejado.\n\n**3. KPI — Sem alteração.** Discovery; baseline a partir da versão interna SN, ramp em Q3.\n\n**4. Próximos Passos**\nProduto: AS-IS, TO-BE com validação da especialista, plano de contas mínimo, dependências externas. Tecnologia: estudo técnico do Ledger Midaz e Matcher.\n\n**5. Bloqueios:** Sem bloqueios externos."}, {"proj": "motor-contabil", "projNome": "Motor Contábil", "data": "2026-05-15", "autor": "Andressa", "health": "No prazo", "body": "**Título do Update:** Semana de 15/05/2026\n**Saúde do Projeto:** 🟢 On track\n\n**1. Evolução e Progresso**\nSem evolução técnica ou de negócio nesta semana. O projeto foi deliberadamente desprioritizado no Cycle 1 em favor de outras iniciativas do quarter. Nenhum marco ou entrega atingido.\n\n**2. Gestão de Riscos**\nOn track conforme planejamento. A ausência de progresso é esperada — o Motor Contábil entra em execução no Cycle 2.\n\n**3. KPI**\nConciliador piloto + 5 estágios. Status: -. Baseline ainda não estabelecido.\n\n**4. Próximos Passos**\nAgendar reuniões de contexto das ferramentas (Conciliador, Ledger, Matcher) com Jorge e Jeni · agendar discovery das primeiras jornadas contábeis (5 estágios priorizados para Q2). Nenhuma entrega técnica prevista.\n\n**5. Bloqueios externos**\nNão há bloqueios. Disponibilidade de Jorge e Jeni para as reuniões de contexto é pré-condição para o início do Discovery."}];

  .empty .eic{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#ede9fe,#dde9fa);display:grid;place-items:center;margin:0 auto .8rem;font-size:1.4rem}

  .chips select{border:1px solid var(--border);border-radius:.6rem;padding:.38rem .6rem;font-size:.8rem;font-family:inherit;background:#fff;color:var(--text)}
</style>

<body>

  <aside class="sidebar">

      <svg class="logo" viewBox="0 0 40 40" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M35.3985 0H4.16432C3.01466 0 1.97449 0.472325 1.219 1.23247C0.467163 1.99631 0 3.04797 0 4.21033V35.7897C0 36.952 0.467163 38.0037 1.219 38.7675C1.97084 39.5314 3.01466 40 4.16432 40H35.3985C36.5482 40 37.5884 39.5277 38.3439 38.7675C39.0993 38.0074 39.5629 36.952 39.5629 35.7897V4.21033C39.5629 3.04797 39.0957 1.99631 38.3439 1.23247C37.592 0.472325 36.5482 0 35.3985 0ZM11.5404 30.1661C11.1316 30.5793 10.5951 30.786 10.0586 30.786C9.52209 30.786 8.98559 30.5793 8.57682 30.1661L6.12421 27.6863L3.67161 25.2066C3.26284 24.7934 3.05846 24.2509 3.05846 23.7048C3.05846 23.1587 3.26284 22.6199 3.67161 22.2066L6.86511 18.9779L10.0586 15.7491L13.993 19.7269L17.9274 23.7048L14.7339 26.9336L11.5404 30.1624V30.1661ZM11.8689 13.9594L15.0368 10.7565L18.2048 7.5535C18.6281 7.12546 19.1829 6.91144 19.7413 6.91144C20.2997 6.91144 20.8508 7.12546 21.2778 7.5535L24.4458 10.7565L27.6137 13.9594L23.6793 17.9373L19.7449 21.9151L15.8105 17.9373L11.8762 13.9594H11.8689ZM35.8146 25.1255L33.2781 27.69L30.7415 30.2546C30.3546 30.6458 29.8473 30.8413 29.34 30.8413C28.8327 30.8413 28.3254 30.6458 27.9385 30.2546L24.7012 26.9816L21.4639 23.7085L25.3983 19.7306L29.3327 15.7528L32.57 19.0258L35.8073 22.2989C36.1942 22.69 36.3876 23.2029 36.3876 23.7159C36.3876 24.2288 36.1942 24.7417 35.8073 25.1328L35.8146 25.1255Z"/></svg>

<script>
/* ===== LÓGICA ===== */
const STATUS_PCT = {"Pendente":0,"Triage":0,"Refinado":10,"Em andamento":50,"Em revisão":80,"Concluído":100,"Cancelado":null};
const AREA_COLORS = {"Fiscal":"#0171E4","Engenharia":"#16a34a","Produto/Design":"#5b21b6","DP":"#be123c","Contábil":"#7c3aed","Cockpit":"#92400e","Hub":"#0891b2"};
const ROTULO_SQUAD = "Squad";
const squad = a => ROTULO_SQUAD + " " + a;
const hoje = new Date();
const okrNome = id => (DADOS.okrs.find(o=>o.id===id)||{}).nome || "";

function pctOf(t){ const p = STATUS_PCT[t.status]; return (p===undefined?0:p); }
function ativa(t){ return t.status !== "Cancelado"; }
const hojeISO = new Date().toISOString().slice(0,10);
function atrasada(t){ return t.venc && t.status!=="Concluído" && t.venc < hojeISO; }
function projPct(p){
  let v;
  if(p.pctLinear!=null) v=p.pctLinear; // % do milestone no Linear (reporte semanal)
  else { const ts=(p.tarefas||[]).filter(ativa).filter(t=>!t.entrega); v = ts.length?Math.round(ts.reduce((s,t)=>s+(pctOf(t)||0),0)/ts.length):(p.pctManual!=null?p.pctManual:0); }
  return v; // % real do milestone do Linear (sem teto — 100% permitido)
}
function pctColor(p){ return p>=70?"var(--green)":p>=30?"var(--amber)":"var(--red)"; }
function healthClass(h){ return h==="No prazo"?"h-ok":h==="Em risco"?"h-risco":"h-off"; }
function healthDot(h){ return h==="No prazo"?"var(--green)":h==="Em risco"?"var(--amber)":"var(--red)"; }
// Régua: a "situação" do deck (On track / Done / Atrasado / Pendente), calculada
// em relação à DATA ALVO (venc). Concluído=Done · venc no passado e não concluído=Atrasado.
function statusPill(t){
  if(t.status==="Cancelado") return '<span class="st-empty">cancelado</span>';
  if(t.status==="Concluído") return '<span class="pill st-done">Done</span>';
  if(atrasada(t)) return '<span class="pill st-late">Atrasado</span>';
  if(t.status==="Pendente"||t.status==="Triage") return '<span class="pill st-pend">Pendente</span>';
  return '<span class="pill st-ontrack">On track</span>';
}
function fmt(d){ if(!d)return"—"; const [y,m,dd]=d.split("-"); return dd+"/"+m+"/"+y; }
// Célula de Data alvo: vermelho se atrasada (passou da data e não concluída).
function vencCell(t){ if(!t.venc) return '<span style="color:var(--muted)">A definir</span>'; return atrasada(t)?`<span style="color:var(--red);font-weight:700">${fmt(t.venc)}</span>`:fmt(t.venc); }

function portfolio(){
  let total=0,done=0,andamento=0,raid=0,ok=0,risco=0,off=0;
  DADOS.projetos.forEach(p=>{
    (p.tarefas||[]).forEach(t=>{ if(!ativa(t)||t.entrega)return; total++; if(t.status==="Concluído")done++; else if(["Em andamento","Em revisão","Refinado"].includes(t.status))andamento++; });
    raid += (p.raid||[]).filter(r=>r.status!=="fechado").length;
    if(p.health==="No prazo")ok++; else if(p.health==="Em risco")risco++; else if(p.health==="Off track")off++;
  });
  const deps = (DADOS.dependencias||[]).length;
  const pct = Math.round(DADOS.projetos.reduce((s,p)=>s+projPct(p),0)/DADOS.projetos.length);
  return {total,done,andamento,raid,deps,ok,risco,off,pct,nProj:DADOS.projetos.length};
}
function depBadge(s){
  const m={"Triage":"#94a3b8","Pendente":"#92400e","A iniciar":"#005bb8","Em curso":"#166534","Concluído":"#166534"};
  const bg={"Triage":"#f1f5f9","Pendente":"#fef3c7","A iniciar":"#dde9fa","Em curso":"#dcfce7","Concluído":"#dcfce7"};
  return `<span class="hbadge" style="background:${bg[s]||'#f1f5f9'};color:${m[s]||'#475569'}">${s}</span>`;
}

document.getElementById('brandtxt').innerHTML = DADOS.empresa+' <span class="b">Tech</span>';

function barLine(label,pc,extra){return `<div style="margin-bottom:.8rem"><div style="display:flex;justify-content:space-between;font-size:.84rem"><span style="font-weight:600;font-family:'Roboto'">${label}${extra||''}</span><span style="color:var(--muted)">${pc}%</span></div><div class="pct-bar" style="margin-top:.35rem"><i style="width:${pc}%;background:${pctColor(pc)}"></i></div></div>`;}

function renderDashboard(){
  const m=portfolio();
  document.getElementById('view-dashboard').innerHTML = `
    <div class="pghead"><div><h1>${DADOS.workspace}</h1><div class="st">Resumo executivo por squad • ${m.nProj} motores (Autopilot) • dados e reportes do Linear · 03/07</div></div></div>
    <div class="kpi-hero-sec">
      <div class="hero"><div class="lab">% Conclusão<br>média do portfólio</div>
        <div><div class="big">${m.pct}%</div><div class="bar"><i style="width:${m.pct}%"></i></div><div class="cap">${m.done} de ${m.total} tarefas detalhadas</div></div>
        <div class="mini"><div><div class="v" style="color:#86efac">${m.ok}</div><div class="l">No prazo</div></div><div><div class="v" style="color:#fcd34d">${m.risco}</div><div class="l">Risco</div></div><div><div class="v" style="color:#fca5a5">${m.off}</div><div class="l">Off</div></div></div>
      </div>
      <div class="kpi-grid">
        <div class="kpi"><div class="top"><span class="lab">Projetos</span><span class="ic purple">📁</span></div><div class="val">${m.nProj}</div><div class="sub">3 squads · tema Autopilot · OKR O4</div></div>
        <div class="kpi"><div class="top"><span class="lab">No prazo</span><span class="ic green">✓</span></div><div class="val green">${m.ok}</div><div class="sub">saúde verde no Linear</div></div>
        <div class="kpi"><div class="top"><span class="lab">Em risco</span><span class="ic amber">⚠️</span></div><div class="val amber">${m.risco}</div><div class="sub">Fiscal · DP · Contábil</div></div>
        <div class="kpi"><div class="top"><span class="lab">Off track</span><span class="ic red">⏰</span></div><div class="val red">${m.off}</div><div class="sub">${m.off?'projetos off track':'nenhum off track'}</div></div>
        <div class="kpi"><div class="top"><span class="lab">Bloqueios & Dependências</span><span class="ic amber">🔗</span></div><div class="val amber">${m.deps}</div><div class="sub">cross-time c/ issues no Linear</div></div>
        <div class="kpi"><div class="top"><span class="lab">Ações de Mitigação</span><span class="ic purple">⚑</span></div><div class="val">${m.raid}</div><div class="sub">ações em aberto</div></div>
      </div>
    </div>
    <div class="row2">
      <div class="card"><div class="card-h"><span class="l"><span class="ic">👥</span> Conclusão por squad</span></div><div class="card-b" id="bygrupo"></div></div>
      <div class="card"><div class="card-h"><span class="l"><span class="ic">🎯</span> Conclusão por objetivo (OKR)</span></div><div class="card-b" id="byokr"></div></div>
    </div>
    <div class="card"><div class="card-h"><span class="l"><span class="ic">🧩</span> Conclusão por tema agregador</span><span style="font-weight:400;color:var(--muted);font-size:.78rem">Autopilot = agregação de projetos de várias squads</span></div><div class="card-b" id="bytema"></div></div>`;
  document.getElementById('bygrupo').innerHTML = DADOS.grupos.map(g=>{
    const ps=DADOS.projetos.filter(p=>p.grupo===g); const pc=ps.length?Math.round(ps.reduce((s,p)=>s+projPct(p),0)/ps.length):0;
    const tms=[...new Set(ps.map(p=>p.tema).filter(Boolean))];
    const lbl=g+(tms.length?` <span style="color:var(--purple);font-weight:600">(${tms.join(", ")})</span>`:"");
    return barLine(lbl,pc,` <span style="color:var(--muted);font-weight:400">· ${ps.length}</span>`);
  }).join('');

let EXECV = (function(){try{return localStorage.getItem('execv')||'board';}catch(e){return 'board';}})();
function setExecV(v){ EXECV=v; try{localStorage.setItem('execv',v);}catch(e){} renderExec(); }
function entregasOf(p){ return (p.tarefas||[]).filter(t=>t.entrega); }
function eKids(p,ref){ return (p.tarefas||[]).filter(ativa).filter(t=>t.parent===ref); }
function eInfo(p,e){
  const ch=eKids(p,e.ref);
  const done=ch.filter(c=>c.status==='Concluído').length;
  const pct=ch.length?Math.round(ch.reduce((a,c)=>a+(pctOf(c)||0),0)/ch.length):(pctOf(e)||0);
  const atras=atrasada(e)||ch.some(c=>atrasada(c));
  return {ch,done,total:ch.length,pct,atras};
}
function execKPIs(){
  const projs=DADOS.projetos;
  const pct=Math.round(projs.reduce((s,p)=>s+projPct(p),0)/projs.length);
  let atras=0; projs.forEach(p=>{(p.tarefas||[]).filter(ativa).filter(t=>!t.entrega).forEach(t=>{if(atrasada(t))atras++;});});
  const bloq=(DADOS.dependencias||[]).length;
  return {n:projs.length,pct,atras,bloq};
}
function kpiBox(l,v,c){ return `<div style="background:#f4f5f7;border:1px solid var(--border);border-radius:.7rem;padding:.7rem .9rem"><div style="font-size:.72rem;color:var(--muted)">${l}</div><div style="font-size:1.55rem;font-weight:800;color:${c||'var(--navy)'}">${v}</div></div>`; }
function dot(c){ return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c}"></span>`; }
function dateBR(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }

        <span style="color:var(--muted);font-size:.71rem;min-width:28px;text-align:right">${info.done}/${info.total}</span></div>`;

        <span class="hbadge ${healthClass(p.health)}">${p.health}</span></div>
      <div style="font-size:.71rem;color:var(--muted);margin:.2rem 0 .6rem">${p.grupo} · ${es.length} entregas · ${issues} issues</div>
      <div class="pct-wrap" style="margin-bottom:.2rem"><span class="pct-bar"><i style="width:${pc}%;background:${pctColor(pc)}"></i></span><span style="font-size:.78rem;font-weight:700;color:var(--navy)">${pc}%</span></div>
      ${p.marcoLinear?`<div style="font-size:.64rem;color:var(--muted);margin-bottom:.55rem">% Linear · ${p.marcoLinear}</div>`:'<div style="margin-bottom:.55rem"></div>'}

function eDates(p,e,info){
  let end = e.venc? new Date(e.venc) : null;
  if(!end){ const cv=info.ch.map(c=>c.venc).filter(Boolean).sort(); if(cv.length) end=new Date(cv[cv.length-1]); }
  if(!end) return null;
  let start = e.inicio? new Date(e.inicio) : null;
  if(!start){ const dur=(info.pct>=100?21:info.pct>0?28:14)*864e5; start=new Date(end.getTime()-dur); }
  if(start>=end) start=new Date(end.getTime()-14*864e5);
  return {start,end};
}
function execGantt(){
  const projs=DADOS.projetos;
  let min=null,max=null;
  projs.forEach(p=>entregasOf(p).forEach(e=>{const info=eInfo(p,e);const d=eDates(p,e,info);if(d){if(!min||d.start<min)min=d.start;if(!max||d.end>max)max=d.end;}}));
  const today=new Date();
  if(!min)min=new Date(today); if(!max)max=new Date(today.getTime()+60*864e5);
  if(today<min)min=new Date(today); if(today>max)max=new Date(today);
  min=new Date(min.getTime()-5*864e5); max=new Date(max.getTime()+10*864e5);
  const span=(max-min)||1;
  const pos=d=>Math.max(0,Math.min(100,((d-min)/span)*100));
  const MES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const ticks=[]; let c=new Date(min.getFullYear(),min.getMonth(),1);
  while(c<=max){ticks.push(new Date(c));c=new Date(c.getFullYear(),c.getMonth()+1,1);}
  const tp=pos(today);
  // ===== Ciclos (quinzenas) — EDITÁVEL: âncora = início do Ciclo 3 (08/06), 14 dias =====
  const CIC_ANCHOR=new Date(2026,5,8), CIC_DIAS=14, CIC_NUM=3;
  let cs0=new Date(CIC_ANCHOR); while(cs0>min) cs0=new Date(cs0.getTime()-CIC_DIAS*864e5);
  const cics=[]; for(let cs=new Date(cs0); cs<max; cs=new Date(cs.getTime()+CIC_DIAS*864e5)){
    const num=CIC_NUM+Math.round((cs-CIC_ANCHOR)/(CIC_DIAS*864e5));
    if(num>=1) cics.push({s:new Date(cs), e:new Date(cs.getTime()+CIC_DIAS*864e5), num});
  }
  const curCic=cics.find(k=>k.s<=today&&today<k.e);
  const cicShade=cics.map((k,i)=> (k===curCic)
    ? `<div style="position:absolute;left:${pos(k.s)}%;width:${pos(k.e)-pos(k.s)}%;top:0;bottom:0;background:rgba(1,113,228,.07)"></div>`
    : (i%2 ? `<div style="position:absolute;left:${pos(k.s)}%;width:${pos(k.e)-pos(k.s)}%;top:0;bottom:0;background:rgba(15,23,42,.022)"></div>` : '')).join('');
  const cicLines=cics.map(k=>`<div style="position:absolute;left:${pos(k.s)}%;top:0;bottom:0;border-left:1px dashed var(--border)"></div>`).join('');
  const cicLab=cics.map(k=>{const c=(pos(k.s)+pos(k.e))/2; return `<div style="position:absolute;left:${c}%;bottom:4px;transform:translateX(-50%);font-size:.6rem;font-weight:700;color:${k===curCic?'var(--blue)':'#94a3b8'}">C${k.num}</div>`;}).join('');
  const grid=ticks.map(t=>`<div style="position:absolute;left:${pos(t)}%;top:0;bottom:0;width:1px;background:var(--border)"></div>`).join('');
  const hdr=ticks.map(t=>`<div style="position:absolute;left:${pos(t)}%;top:4px;font-size:.68rem;font-weight:700;color:var(--navy);transform:translateX(3px)">${MES[t.getMonth()]}${t.getMonth()===0?'/'+String(t.getFullYear()).slice(2):''}</div>`).join('');
  let L='', R='';
  L+=`<div style="height:46px"></div>`;
  R+=`<div style="position:relative;height:46px;border-bottom:1px solid var(--border)">${hdr}${cicLab}</div>`;
  projs.forEach((p,pIdx)=>{
    if(pIdx>0){const sep='<div style="height:11px;border-top:1px dashed #cbd5e1;margin-top:5px"></div>';L+=sep;R+=sep;}
    L+=`<div style="height:24px;display:flex;align-items:flex-end;font-weight:700;font-size:.67rem;color:var(--muted);letter-spacing:.03em">${p.nome.split('—')[0].trim().toUpperCase()}</div>`;
    R+=`<div style="height:24px"></div>`;
    entregasOf(p).forEach(e=>{const info=eInfo(p,e);const d=eDates(p,e,info);
      const en=(e.nome.match(/^E\d+/)||[''])[0]; const nm=e.nome.replace(/^E\d+\s*·?\s*/,'');
      const eLate = info.atras;
      const doneLate = info.pct>=100 && e.venc && e.venc < hojeISO;
      const col=eLate?'var(--red)':info.pct>=100?'var(--green)':info.pct>0?'var(--blue)':'#94a3b8';
      L+=`<div style="height:21px;display:flex;align-items:center;font-size:.74rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.nome}"><b style="color:var(--navy);margin-right:.3rem">${en}</b>${nm}</div>`;
      let bar;
      if(d){const l=pos(d.start),w=Math.max(2.5,pos(d.end)-pos(d.start));
        bar=`<div style="position:absolute;left:${l}%;width:${w}%;top:4px;height:12px;border-radius:4px;background:${col};opacity:${info.pct>0?1:.5};${doneLate?'box-shadow:0 0 0 1.5px var(--red)':''}" title="${dateBR(d.start)} → ${dateBR(d.end)}${doneLate?' · concluída em atraso':''}"></div><div style="position:absolute;left:${l}%;margin-left:calc(${w}% + 5px);top:3px;font-size:.65rem;color:var(--muted);white-space:nowrap"><b style="color:var(--navy)">${info.pct}%</b> · ${info.done}/${info.total}</div>`;
      } else { bar=`<div style="position:absolute;left:${tp}%;top:3px;margin-left:5px;font-size:.65rem;color:var(--muted);font-style:italic">a definir</div>`; }
      R+=`<div style="position:relative;height:21px">${bar}</div>`;
    });
  });
  return `<div class="card" style="overflow-x:auto;padding:1rem 1.1rem">
    <div style="display:grid;grid-template-columns:185px 1fr;min-width:640px">
      <div>${L}</div>
      <div style="position:relative">${cicShade}${cicLines}${grid}<div style="position:absolute;left:${tp}%;top:0;bottom:0;width:2px;background:var(--blue);opacity:.55;z-index:3"></div>${R}</div>
    </div></div>
  <div class="legend"><span>${dot('var(--green)')}&nbsp;Concluída no prazo</span><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 1.5px var(--red)"></span>&nbsp;Concluída em atraso</span><span>${dot('var(--blue)')}&nbsp;Em andamento</span><span>${dot('#94a3b8')}&nbsp;Pendente</span><span>${dot('var(--red)')}&nbsp;Atrasada</span><span style="color:var(--muted)"><span style="display:inline-block;width:2px;height:11px;background:var(--blue);vertical-align:-1px;margin-right:4px"></span>hoje (${dateBR(today)})</span><span style="color:var(--muted)">C# = ciclo (quinzena) · faixa azul = ciclo atual</span></div>
  <div class="note">Datas reais das issues do Linear (Start/Due date), agregadas por entrega: <b>início</b> = menor data das filhas · <b>data alvo</b> = maior due das filhas. Entregas sem data alvo no Linear aparecem como “a definir”. Ciclos = quinzenas (C3 = 08–22/06); a âncora é configurável no código do Gantt.</div>`;
}

let DEAL=0;
let DEALF={status:'all', area:'', owner:''};
function openDeal(i){ DEAL=i; DEALF={status:'all', area:'', owner:''}; renderDeal(); go('deal'); }
function openDealById(id){ const i=DADOS.projetos.findIndex(p=>p.id===id); if(i>=0) openDeal(i); }
function setDF(k,v){ DEALF[k]=v; renderDeal(); }
function setDFtab(){ renderDeal(); const b=document.querySelector('#view-deal .subtab[data-s="b"]'); if(b) b.click(); }
function renderDeal(){
  const p=DADOS.projetos[DEAL]; const pc=projPct(p);
  const allT=(p.tarefas||[]).filter(ativa);
  const leaf=allT.filter(t=>!t.entrega);
  const cnt={all:leaf.length,done:leaf.filter(t=>t.status==='Concluído').length,ontrack:leaf.filter(t=>!atrasada(t)&&t.status!=='Concluído'&&!['Pendente','Triage'].includes(t.status)).length,atras:leaf.filter(t=>atrasada(t)).length};
  const bloqCount=(DADOS.dependencias||[]).filter(d=>(d.projetos||[]).includes(p.id)).length;
  const owners=[...new Set(leaf.map(t=>t.owner).filter(o=>o&&o!=='—'))];
  function passF(t){ if(DEALF.area&&t.area!==DEALF.area)return false; if(DEALF.owner&&(t.owner||'—')!==DEALF.owner)return false; if(DEALF.status==='done')return t.status==='Concluído'; if(DEALF.status==='atras')return atrasada(t); if(DEALF.status==='ontrack')return !atrasada(t)&&t.status!=='Concluído'&&!['Pendente','Triage'].includes(t.status); return true; }
  const chip=(k,lab,nv)=>`<span onclick="setDF('status','${k}')" class="fchip ${DEALF.status===k?'on':''}">${lab} ${nv}</span>`;
  const chipsBar=`<div class="chips">${chip('all','Todas',cnt.all)}${chip('done','Done',cnt.done)}${chip('ontrack','On Track',cnt.ontrack)}${chip('atras','Atrasadas',cnt.atras)}<span class="fchip" onclick="setDFtab()">Bloqueio ${bloqCount}</span><select onchange="setDF('area',this.value)"><option value="">Todas as áreas</option>${DADOS.areas.map(a=>`<option ${DEALF.area===a?'selected':''}>${a}</option>`).join('')}</select><select onchange="setDF('owner',this.value)"><option value="">Todos os owners</option>${owners.map(o=>`<option ${DEALF.owner===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  const vis=t=>passF(t);
  const childrenOf=ref=>allT.filter(t=>t.parent===ref);
  const ePct=t=>{const ch=childrenOf(t.ref).filter(ativa);return ch.length?Math.round(ch.reduce((a,c)=>a+(pctOf(c)||0),0)/ch.length):(pctOf(t)||0);};
  const trow=(t,oo)=>{oo=oo||{};const pct=oo.epct!=null?oo.epct:(pctOf(t)||0);const ind=oo.child?'padding-left:2.4rem':'';const mk=oo.child?'<span style="color:#cbd2dd;margin-right:.45rem">└─</span>':'';const nm=oo.parent?('<b>'+t.nome+'</b>'):t.nome;const eb=oo.parent?' <span class="okr" style="background:var(--navy);color:#fff">entrega</span>':'';return `<tr${oo.child?' style="background:#fcfbf7"':''}><td class="num">${oo.num||''}</td><td style="${ind}">${mk}<span class="ref">${t.ref}</span>${nm}${eb}</td><td>${t.owner||'—'}</td><td style="white-space:nowrap">${vencCell(t)}</td><td class="st">${statusPill(t)}</td><td><div class="pct-wrap"><div class="pct-bar"><i style="width:${pct}%;background:${pctColor(pct)}"></i></div><span style="font-size:.75rem;color:var(--muted)">${pct}%</span></div></td></tr>`;};
  let trows='',n=0;
  allT.filter(t=>t.entrega||!t.parent).forEach(t=>{
    if(t.entrega){const ch=childrenOf(t.ref);const chV=ch.filter(vis);if(!vis(t)&&!chV.length)return;n++;trows+=trow(t,{num:n,parent:true,epct:ePct(t)});chV.forEach(c=>{trows+=trow(c,{child:true});});}
    else{if(!vis(t))return;n++;trows+=trow(t,{num:n});}
  });
  if(!(p.tarefas||[]).length) trows=`<tr><td colspan="5"><div class="empty"><div class="eic">🗂️</div><div style="font-family:'Roboto';font-weight:600;color:var(--navy)">${p.statusProjeto}</div><div style="font-size:.8rem;margin-top:.3rem">Acompanhamento a nível de projeto — tarefas detalhadas entram com o sync do Linear.</div></div></td></tr>`;
  const raidHtml=(p.raid&&p.raid.length)?p.raid.map(raidCard).join(''):`<div class="empty"><div class="eic">⚑</div><div style="font-family:'Roboto';font-weight:600;color:var(--navy)">Nenhuma ação de mitigação</div></div>`;
  const pdeps=(DADOS.dependencias||[]).filter(d=>(d.projetos||[]).includes(p.id));
  const depsHtml = pdeps.length ? ('<div class="card" style="overflow-x:auto"><table><thead><tr><th>Dependência</th><th style="width:64px">Tipo</th><th>Fluxo</th><th>Issues</th><th>Responsável</th><th style="width:100px">Data alvo</th><th style="width:110px">Status</th></tr></thead><tbody>'+pdeps.map(d=>`<tr style="${d.critico?'box-shadow:inset 3px 0 0 var(--red)':''}"><td><b>${d.nome}</b>${d.critico?' <span class="hbadge h-off">\u26a0 crítico</span>':''}<div style="font-size:.76rem;color:var(--muted);margin-top:.2rem">${d.desc||''}</div></td><td class="st">${tipoChip(d.tipo)}</td><td style="white-space:nowrap"><span class="okr" style="background:#e8f0fd;color:#005bb8">${d.fluxo}</span></td><td>${(d.refs||[]).map(r=>`<span class="ref">${r}</span>`).join(' ')||'\u2014'}</td><td>${d.responsavel||'\u2014'}</td><td style="white-space:nowrap">${d.venc?fmt(d.venc):'<span style="color:var(--muted)">A definir</span>'}</td><td class="st">${depBadge(d.status)}</td></tr>`).join('')+'</tbody></table></div>') : '<div class="empty"><div class="eic">\ud83d\udd17</div><div style="font-family:\'Roboto\';font-weight:600;color:var(--navy)">Sem bloqueios/dependências neste projeto</div></div>';
  document.getElementById('view-deal').innerHTML = `
    <span class="back" onclick="go('projetos')">← Voltar para Projetos</span>
    <div class="pghead"><div><h1>${p.nome}</h1><div class="st">Squad ${p.grupo} · ${p.iniciativa||''} · lead ${p.lead||'—'} · ${fmt(p.inicio)} → ${fmt(p.alvo)}</div></div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap"><span class="okr">${p.okr} · ${okrNome(p.okr)}</span><span class="hbadge ${healthClass(p.health)}">${p.health}</span></div></div>
    ${p.marco?`<div class="mstone"><div class="mp">${pc}%</div><div style="flex:1"><div style="font-family:'Roboto';font-weight:600">${p.marco}</div><div style="font-size:.78rem;color:var(--muted)">Alvo ${fmt(p.alvo)}</div><div class="pct-bar" style="margin-top:.4rem"><i style="width:${pc}%;background:${pctColor(pc)}"></i></div></div></div>`:''}
    ${p.progresso?`<div class="note"><b>Status da semana:</b> ${p.progresso}</div>`:''}
    <div class="subtabs"><div class="subtab active" data-s="t">Tarefas</div><div class="subtab" data-s="b">Bloqueios</div><div class="subtab" data-s="r">Ações de Mitigação</div><div class="subtab" data-s="h">Health</div></div>
    <div class="subview active" id="sub-t">${chipsBar}<div class="card" style="overflow-x:auto"><table><thead><tr><th class="num">#</th><th>Tarefa (passo)</th><th>Responsável</th><th style="width:120px">Data alvo</th><th style="width:120px">Situação</th><th style="width:150px">% Conclusão</th></tr></thead><tbody>${trows}</tbody></table></div>
      <div class="legend"><span><i style="background:var(--blue)"></i>On track</span><span><i style="background:var(--green)"></i>Done</span><span><i style="background:var(--red)"></i>Atrasado (passou da data alvo)</span><span><i style="background:#94a3b8"></i>Pendente</span></div></div>
    <div class="subview" id="sub-r"><div class="card"><div class="card-b">${raidHtml}</div></div></div>
    <div class="subview" id="sub-b">${depsHtml}</div>
    <div class="subview" id="sub-h"><div class="card"><div class="card-b"><div style="display:flex;align-items:center;gap:.8rem"><span class="hbadge ${healthClass(p.health)}">${p.health}</span><span style="font-size:.85rem;color:var(--muted)">Farol do projeto (reporte semanal). Conclusão atual: ${pc}%.</span></div>${p.progresso?`<p style="font-size:.85rem;margin:.6rem 0 0">${p.progresso}</p>`:''}</div></div></div>`;
  document.querySelectorAll('#view-deal .subtab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('#view-deal .subtab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
    document.querySelectorAll('#view-deal .subview').forEach(s=>s.classList.remove('active'));
    document.getElementById('sub-'+t.dataset.s).classList.add('active');
  }));
}

const TIPO_LABEL = {FS:"Finish→Start", FF:"Finish→Finish", SS:"Start→Start", SF:"Start→Finish"};
function tipoChip(t){ return `<span class="okr" style="background:#f1f5f9;color:#475569" title="${TIPO_LABEL[t]||t}">${t}</span>`; }
function renderDeps(){
  const deps = DADOS.dependencias||[];
  const crit = deps.filter(d=>d.critico).length;
  const grupos = [...new Set(deps.map(d=>d.categoria))];
  let body='';
  grupos.forEach(cat=>{
    const ds=deps.filter(d=>d.categoria===cat);
    let rows=ds.map(d=>`<tr style="${d.critico?'box-shadow:inset 3px 0 0 var(--red)':''}">
      <td><span class="pname">${d.nome}</span>${d.critico?' <span class="hbadge h-off">⚠ Caminho crítico</span>':''}<div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${d.desc||''}</div></td>
      <td class="st">${tipoChip(d.tipo)}</td>
      <td style="white-space:nowrap"><span class="okr" style="background:#e8f0fd;color:#005bb8">${d.fluxo}</span></td>
      <td>${(d.refs||[]).map(r=>`<span class="ref">${r}</span>`).join(' ')||'<span style="color:var(--muted)">—</span>'}</td>
      <td>${d.responsavel||'—'}</td>
      <td style="white-space:nowrap">${d.venc?fmt(d.venc):'<span style="color:var(--muted)">A definir</span>'}</td>
      <td class="st">${depBadge(d.status)}</td></tr>`).join('');
    body+=`<div class="card"><div class="card-h"><span class="l"><span class="ic">🔗</span> ${cat} <span style="font-weight:400;color:var(--muted);font-size:.78rem">· ${ds.length}</span></span></div>
      <div style="overflow-x:auto"><table><thead><tr><th>Dependência (predecessor → sucessor)</th><th style="width:64px">Tipo</th><th>Fluxo</th><th>Issues no Linear</th><th>Responsável</th><th style="width:110px">Data alvo</th><th style="width:110px">Status</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  });
  document.getElementById('view-deps').innerHTML = `
    <div class="pghead"><div><h1>Bloqueios & Dependências</h1><div class="st">${deps.length} dependências cross-time com issues no Linear · <b style="color:var(--red)">${crit}</b> no caminho crítico</div></div></div>
    ${body}
    <div class="note"><b>Tipo</b> (predecessor → sucessor): <b>FS</b> Finish→Start (mais comum — a predecessora termina p/ a sucessora começar) · <b>FF</b> · <b>SS</b> · <b>SF</b>.<br><b>Status</b>: Triage (triagem) · Pendente (backlog priorizado) · A iniciar (tem dono, não começou) · Em curso (em execução). Linha com borda vermelha = <b>caminho crítico</b>.</div>`;
}

function sevBadge(sv){ const m={"Alta":["#fee2e2","#991b1b"],"Média":["#fef3c7","#92400e"],"Baixa":["#dbeafe","#1e40af"]}; const c=m[sv]||["#f1f5f9","#475569"]; return `<span class="hbadge" style="background:${c[0]};color:${c[1]}">${sv}</span>`; }
const TIPO_RAID={risco:"Risco",impedimento:"Impedimento",decisao:"Decisão",premissa:"Premissa"};
let RAIDF='abertos';
function setRAIDF(v){ RAIDF=v; renderRaid(); }
function renderRaid(){
  const items=[]; DADOS.projetos.forEach((p,i)=>(p.raid||[]).forEach(r=>items.push({r,proj:p.nome,pi:i})));
  const open=items.filter(x=>(x.r.status||'aberto')!=='fechado');
  const closed=items.filter(x=>(x.r.status||'aberto')==='fechado');
  const list=RAIDF==='fechados'?closed:open;
  const rows=list.length?list.map((x,n)=>{const r=x.r;return `<tr class="proj-row" onclick="openDeal(${x.pi})">
      <td class="num">${n+1}</td>
      <td><b>${r.titulo}</b>${r.tipo?` <span class="okr" style="background:#ede9fe;color:#5b21b6">${TIPO_RAID[r.tipo]||r.tipo}</span>`:''}</td>
      <td>${x.proj.split('—')[0].trim()}</td>
      <td>${r.area||'—'}</td>
      <td class="st">${sevBadge(r.severidade||'—')}</td>
      <td class="st">${(r.status||'aberto')==='fechado'?'<span class="hbadge h-ok">Fechado</span>':'<span class="hbadge h-risco">Aberto</span>'}</td>
      <td>${r.owner||'—'}</td>
      <td>${(r.refs||[]).map(x=>`<span class="ref">${x}</span>`).join(' ')||'—'}</td>
      <td style="text-align:center">${r.participantes?('👥 '+r.participantes):'—'}</td>
      <td style="white-space:nowrap">${r.venc?fmt(r.venc):'<span style="color:var(--muted)">A definir</span>'}</td></tr>`;}).join('')
    :`<tr><td colspan="10"><div class="empty"><div class="eic">⚑</div><div style="font-family:'Roboto';font-weight:600;color:var(--navy)">Nenhuma ação ${RAIDF==='fechados'?'fechada':'aberta'}</div></div></td></tr>`;
  document.getElementById('view-raid').innerHTML = `
    <div class="pghead"><div><h1>Ações de Mitigação</h1><div class="st">Riscos · Premissas · Impedimentos · Decisões — clique para abrir o projeto</div></div></div>
    <div class="chips"><span class="fchip ${RAIDF!=='fechados'?'on':''}" onclick="setRAIDF('abertos')">✔ Todos abertos ${open.length}</span><span class="fchip ${RAIDF==='fechados'?'on':''}" onclick="setRAIDF('fechados')">Fechados ${closed.length}</span></div>
    <div class="card" style="overflow-x:auto"><table><thead><tr><th class="num">#</th><th>Título</th><th>Projeto afetado</th><th>Área</th><th>Severidade</th><th>Status</th><th>Owner</th><th>Issues</th><th style="text-align:center">Particip.</th><th style="width:110px">Prazo</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ===== Reporte Semanal (Project Updates do Linear) ===== */
function rEsc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdInline(t){
  t=rEsc(t);
  t=t.replace(/\\([\\`*_{}\[\]()#+\-.!~|])/g,'$1');
  t=t.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--blue)">$1</a>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/`([^`]+)`/g,'<code style="background:#f1f0ea;padding:0 .25rem;border-radius:3px">$1</code>');
  return t;
}
function repTable(rows){
  const cells=rows.map(r=>r.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim()));
  const body=cells.filter(r=>!r.every(c=>/^[-: ]*$/.test(c)));
  if(!body.length) return '';
  const head=body[0], rest=body.slice(1);
  return '<table style="width:100%;border-collapse:collapse;font-size:.78rem;margin:.4rem 0"><thead><tr>'+head.map(c=>'<th style="text-align:left;border-bottom:1px solid var(--border);padding:.3rem .4rem;color:var(--muted)">'+mdInline(c)+'</th>').join('')+'</tr></thead><tbody>'+rest.map(r=>'<tr>'+r.map(c=>'<td style="border-bottom:1px solid var(--border);padding:.3rem .4rem;vertical-align:top">'+mdInline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
}
function mdLite(md){
  const lines=md.split('\n'); let html='', i=0, inUl=false;
  const closeUl=()=>{if(inUl){html+='</ul>';inUl=false;}};
  while(i<lines.length){
    let ln=lines[i];
    if(ln.indexOf('|')>=0 && ln.split('|').length>2){
      const tb=[]; while(i<lines.length && lines[i].indexOf('|')>=0){tb.push(lines[i]);i++;}
      closeUl(); html+=repTable(tb); continue;
    }
    if(/^#{1,4}\s/.test(ln)){ closeUl(); const lvl=ln.match(/^#+/)[0].length; html+='<div style="font-family:Roboto;font-weight:700;font-size:'+(lvl<=2?'.95rem':'.85rem')+';margin:.7rem 0 .3rem">'+mdInline(ln.replace(/^#{1,4}\s/,''))+'</div>'; i++; continue; }
    if(/^\s*[*\-]\s+/.test(ln)){ if(!inUl){html+='<ul style="margin:.2rem 0 .5rem;padding-left:1.1rem">';inUl=true;} html+='<li style="margin:.15rem 0">'+mdInline(ln.replace(/^\s*[*\-]\s+/,''))+'</li>'; i++; continue; }
    if(ln.trim()===''){ closeUl(); i++; continue; }
    closeUl(); html+='<p style="margin:.35rem 0">'+mdInline(ln)+'</p>'; i++;
  }
  closeUl(); return html;
}
let REPF='all';
function setREPF(v){ REPF=v; renderReports(); }
function renderReports(){
  const projs=DADOS.projetos;
  const all=(typeof REPORTS!=='undefined'?REPORTS:[]);
  const chips='<div class="chips" style="margin-bottom:1rem"><span class="fchip '+(REPF==='all'?'on':'')+'" onclick="setREPF(\'all\')">Todos</span>'+projs.map(p=>'<span class="fchip '+(REPF===p.id?'on':'')+'" onclick="setREPF(\''+p.id+'\')">'+p.nome.split('—')[0].trim()+'</span>').join('')+'</div>';
  let body='';
  projs.forEach(p=>{
    if(REPF!=='all'&&REPF!==p.id)return;
    const reps=all.filter(r=>r.proj===p.id).sort((a,b)=>b.data.localeCompare(a.data));
    if(!reps.length)return;
    body+='<div style="margin:1.3rem 0 .5rem;display:flex;align-items:center;gap:.6rem"><span class="adot" style="background:'+(AREA_COLORS[p.grupo]||'#888')+'"></span><span onclick="openDealById(\''+p.id+'\')" style="font-family:Roboto;font-weight:700;font-size:1rem;cursor:pointer;color:var(--blue)" title="Abrir projeto">'+p.nome.split('—')[0].trim()+'</span><span class="hbadge '+healthClass(p.health)+'">'+p.health+'</span><span style="font-size:.74rem;color:var(--muted)">'+reps.length+' reporte(s)</span></div>';
    reps.forEach((r,idx)=>{ const open=idx===0;
      body+='<div class="card" style="margin-bottom:.7rem;padding:.85rem 1.1rem">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\'">'
        +'<span style="font-family:Roboto;font-weight:700">📅 '+fmt(r.data)+'</span>'
        +'<span style="display:flex;gap:.5rem;align-items:center"><span class="hbadge '+healthClass(r.health)+'">'+r.health+'</span><span style="font-size:.72rem;color:var(--muted)">'+(r.autor||'')+'</span></span></div>'
        +'<div style="display:'+(open?'block':'none')+';margin-top:.6rem;font-size:.85rem;line-height:1.55;border-top:1px solid var(--border);padding-top:.6rem">'+mdLite(r.body)+'</div></div>';
    });
  });
  if(!body) body='<div class="empty"><div class="eic">📝</div><div style="font-family:Roboto;font-weight:600;color:var(--navy)">Sem reportes cadastrados</div></div>';
  document.getElementById('view-reports').innerHTML='<div class="pghead"><div><h1>Reporte Semanal</h1><div class="st">Project Updates do Linear · texto idêntico ao Linear · histórico por semana · clique na data para abrir/fechar</div></div></div>'+chips+body;
}

function go(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active', a.dataset.v===v));
  window.scrollTo(0,0);
}
document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>go(a.dataset.v)));

renderDashboard(); renderOKR(); renderExec(); renderProjetos(); renderRaid(); renderReports();
</script>
</body>
